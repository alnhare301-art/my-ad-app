<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | السلطة المطلقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0F172A; --card: #1E293B; --primary: #7C3AED;
            --success: #22C55E; --text: #E5E7EB; --text-dim: #94A3B8; --gold: #fbbf24;
        }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding-top: 75px; padding-bottom: 90px; overflow-x: hidden;
        }

        /* 1. الهيدر الزجاجي (ثابت) */
        header {
            position: fixed; top: 0; width: 100%; height: 65px; background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 2000; border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img-small { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--primary); }
        .user-trigger { position: relative; cursor: pointer; border: 2px solid var(--primary); border-radius: 50%; padding: 2px; }

        /* قائمة المستخدم المنبثقة */
        .user-modal {
            display: none; position: fixed; top: 75px; left: 15px; background: var(--card);
            width: 280px; border-radius: 15px; padding: 20px; z-index: 2001;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid rgba(124, 58, 237, 0.4);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 2. الشريط الإعلاني المتحرك (إصلاح العمل) */
        .promo-banner {
            margin: 10px 15px; background: linear-gradient(90deg, var(--primary), #4c1d95);
            border-radius: 12px; height: 48px; display: flex; align-items: center;
            overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1);
        }
        .marquee-box { width: 100%; overflow: hidden; white-space: nowrap; }
        .marquee-text {
            display: inline-block; animation: marquee-kf 18s linear infinite;
            font-weight: 800; font-size: 14px; color: #fff; padding-right: 50px;
        }
        @keyframes marquee-kf { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .btn-enter-fixed { 
            position: absolute; left: 8px; background: #fff; color: #000; 
            padding: 5px 14px; border-radius: 8px; text-decoration: none; 
            font-weight: 900; font-size: 11px; z-index: 10; box-shadow: -5px 0 15px rgba(0,0,0,0.3);
        }

        /* 3. قسم الإحصائيات والرسم البياني */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px 15px; }
        .stat-box { background: var(--card); padding: 12px 5px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-box h4 { margin: 0; color: var(--primary); font-size: 18px; font-weight: 900; }
        .stat-box p { margin: 0; font-size: 10px; color: var(--text-dim); }

        /* 4. كروت السحوبات المدمجة (الأزرار في نفس السطر) */
        .item-card { 
            background: var(--card); border-radius: 16px; padding: 14px; margin: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-right: 5px solid var(--primary); position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .item-card:hover { transform: translateX(-5px); background: #242f4d; }
        .featured-glow { border-right-color: var(--gold); box-shadow: 0 0 15px rgba(251, 191, 36, 0.15); }

        .btn-action { 
            background: var(--primary); color: white; border: none; 
            padding: 9px 18px; border-radius: 10px; font-weight: 800; 
            font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        .btn-success { background: var(--success); }

        /* 5. عجلة الحظ */
        #wheel-view { display: none; text-align: center; padding: 20px 0; }
        .wheel-outer { position: relative; width: 300px; height: 300px; margin: 30px auto; }
        .wheel-pin { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); z-index: 20; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--gold); filter: drop-shadow(0 0 8px var(--gold)); }
        #main-wheel { width: 100%; height: 100%; border-radius: 50%; border: 10px solid var(--card); background: url('https://files.catbox.moe/5s7y7a.png') center/cover; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); box-shadow: 0 0 30px rgba(124, 58, 237, 0.3); }

        /* 6. القائمة السفلية (Navigation Bar) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.08); z-index: 2000;
        }
        .nav-item { color: var(--text-dim); text-decoration: none; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 24px; margin-bottom: 4px; }

        #chart-wrap { background: var(--card); margin: 15px; border-radius: 15px; padding: 15px; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://files.catbox.moe/5s7y7a.png" class="logo-img-small">
            <span style="font-weight: 900; font-size: 18px;">روليت سراب</span>
        </div>
        <div class="user-trigger" onclick="toggleUserModal()">
            <img src="https://files.catbox.moe/5s7y7a.png" style="width:35px; border-radius:50%;">
        </div>
    </header>

    <div id="userModal" class="user-modal">
        <h3 style="color:var(--primary); margin-top:0;">حسابي الشخصي</h3>
        <p style="font-size:13px; border-bottom:1px solid #334155; padding-bottom:10px;">ID: #55012 | سراب VIP</p>
        <button class="btn-action" style="width:100%" onclick="toggleUserModal()">إغلاق</button>
    </div>

    <div class="container">
        <div id="home-view">
            <div class="promo-banner">
                <div class="marquee-box">
                    <span class="marquee-text" id="promo-msg">🔥 جاري تحميل آخر عروض روليت سراب.. ترقبوا الجوائز!</span>
                </div>
                <a href="#" id="promo-link" class="btn-enter-fixed">عرض ⚡</a>
            </div>

            <div style="display:flex; gap:10px; padding: 0 15px;">
                <button class="btn-action" style="flex:1" onclick="toggleChart()">📊 الإحصائيات</button>
                <button class="btn-action" style="flex:1; background:var(--gold); color:#000" onclick="alert('سحوباتك قريباً')">🎁 سحوباتي</button>
            </div>

            <div id="chart-wrap"><canvas id="myChart"></canvas></div>

            <div class="stats-grid">
                <div class="stat-box"><h4>104</h4><p>سحب</p></div>
                <div class="stat-box"><h4>24k</h4><p>مشارك</p></div>
                <div class="stat-box"><h4>1k</h4><p>فائز</p></div>
                <div class="stat-box"><h4>99%</h4><p>تحقق</p></div>
            </div>

            <h3 style="padding:0 15px; font-size:16px;">💎 سحوبات ممولة</h3>
            <div id="ads-area"></div>

            <h3 style="padding:0 15px; font-size:16px;">📄 أحدث المنشورات</h3>
            <div id="posts-area"></div>
        </div>

        <div id="wheel-view">
            <h2 style="color:var(--gold); font-weight:900;">عجلة الحظ اليومية 🎡</h2>
            <div class="wheel-outer">
                <div class="wheel-pin"></div>
                <div id="main-wheel"></div>
            </div>
            <button id="spin-btn" class="btn-action" style="padding:15px 50px; font-size:18px;" onclick="startSpin()">العب الآن 🚀</button>
            <p id="spin-result" style="margin-top:20px; font-weight:800; color:var(--success)"></p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchView('home-view', this)"><i>🏠</i>الرئيسية</div>
        <div class="nav-item" onclick="switchView('wheel-view', this)"><i>🎡</i>العجلة</div>
        <a href="https://t.me/Gift_News" class="nav-item"><i>📣</i>القناة</a>
        <a href="https://t.me/ttsnn" class="nav-item"><i>📢</i>قناتنا</a>
    </nav>

    <script>
        const db = "https://sarab-app-84448-default-rtdb.firebaseio.com";
        let isSpinning = false;

        function toggleUserModal() {
            const m = document.getElementById('userModal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function switchView(id, el) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('wheel-view').style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active');
        }

        function toggleChart() {
            const w = document.getElementById('chart-wrap');
            w.style.display = w.style.display === 'block' ? 'none' : 'block';
            if(w.style.display === 'block') initChart();
        }

        function initChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['S', 'M', 'T', 'W', 'T', 'F', 'S'],
                    datasets: [{ label: 'النشاط', data: [5, 12, 8, 20, 15, 25, 30], borderColor: '#7C3AED', tension: 0.4 }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        function startSpin() {
            if(isSpinning) return;
            isSpinning = true;
            const w = document.getElementById('main-wheel');
            const res = document.getElementById('spin-result');
            const deg = Math.floor(Math.random() * 360) + 2000;
            w.style.transform = `rotate(${deg}deg)`;
            res.innerText = "جاري السحب...";
            setTimeout(() => {
                isSpinning = false;
                res.innerText = "مبروك! حصلت على هدية مجانية 🎁";
            }, 4000);
        }

        async function syncData() {
            try {
                const r = await fetch(`${db}/.json`);
                const d = await r.json();
                
                // تحديث الشريط المتحرك
                if(d.ticker) {
                    document.getElementById('promo-msg').innerText = d.ticker.text;
                    document.getElementById('promo-link').href = d.ticker.link || "#";
                }

                // الإعلانات
                const adsArea = document.getElementById('ads-area');
                let adsHTML = "";
                const ads = d.active_ads || {};
                Object.keys(ads).reverse().slice(0, 5).forEach(k => {
                    adsHTML += `
                        <div class="item-card ${ads[k].featured ? 'featured-glow' : ''}">
                            <div style="flex:1">
                                <b style="font-size:14px; display:block;">${ads[k].title}</b>
                                <small style="color:var(--text-dim)">👥 ${ads[k].participants || 0} مشارك</small>
                            </div>
                            <button class="btn-action" onclick="window.location.href='${ads[k].post_url}'">شارك</button>
                        </div>`;
                });
                adsArea.innerHTML = adsHTML;

                // المنشورات
                const postsArea = document.getElementById('posts-area');
                let postsHTML = "";
                (d.latest_posts || []).reverse().slice(0, 10).forEach(p => {
                    postsHTML += `
                        <div class="item-card" style="border-right-color:var(--success)">
                            <div style="flex:1">
                                <b style="font-size:14px; display:block;">${p.text.substring(0,35)}...</b>
                                <small style="color:var(--text-dim)">👁️ ${p.views || 0} مشاهدة</small>
                            </div>
                            <button class="btn-action btn-success" onclick="window.location.href='${p.url}'">فتح</button>
                        </div>`;
                });
                postsArea.innerHTML = postsHTML;

            } catch(e) {}
        }

        setInterval(syncData, 5000);
        syncData();
    </script>
</body>
</html>
