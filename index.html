<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب - الواقعي</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #121421; color: white; padding: 15px; }
        .stat-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #1a1d30; padding: 20px; border-radius: 15px; border-bottom: 3px solid #6366f1; text-align: center; }
        .card h2 { color: #818cf8; margin: 0; font-size: 32px; }
        .list-section { margin-top: 25px; }
        .list-item { background: #1a1d30; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid #f687b3; }
        .item-name { font-weight: bold; font-size: 14px; }
        .item-count { background: #2d3748; padding: 5px 10px; border-radius: 8px; color: #f687b3; font-size: 12px; }
    </style>
</head>
<body>
    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="color:#b794f4; margin:0;">روليت سراب 🔥</h2>
        <p style="color:#718096; font-size:12px;">لوحة التحكم والإحصائيات الحقيقية</p>
    </div>

    <div class="stat-box">
        <div class="card"><h2 id="total">32</h2><p>إجمالي السحوبات</p></div>
        <div class="card"><h2 id="active">16</h2><p>سحب نشط</p></div>
    </div>

    <div class="list-section">
        <h4 style="color:#cbd5e1;">🔥 أقوى 3 سحوبات (بالمشاركة)</h4>
        <div class="list-item">
            <span class="item-name">روليت الجائزة الكبرى</span>
            <span class="item-count">281 مشارك</span>
        </div>
        <div class="list-item">
            <span class="item-name">مسابقة سراب السريعة</span>
            <span class="item-count">140 مشارك</span>
        </div>
    </div>

    <div style="margin-top:30px; display:grid; gap:10px;">
        <a href="https://t.me/Smileettbot?start=create" style="background:#6366f1; color:white; padding:15px; border-radius:12px; text-decoration:none; text-align:center; font-weight:bold;">📝 إنشاء روليت جديد</a>
        <a href="https://t.me/Smileettbot?start=ads" style="background:#2d3748; color:white; padding:15px; border-radius:12px; text-decoration:none; text-align:center; font-weight:bold;">📢 طلب إعلان</a>
    </div>
</body>
</html>
