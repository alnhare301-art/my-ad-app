<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة سراب PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #f687b3; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        
        .header-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 2000; border-bottom: 1px solid rgba(99, 102, 241, 0.2); }
        .ticker-wrap { background: linear-gradient(90deg, var(--primary), #a855f7); height: 35px; display: flex; align-items: center; overflow: hidden; }
        .ticker-text { white-space: nowrap; animation: ticker 25s linear infinite; font-size: 13px; font-weight: bold; width: 100%; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { padding: 90px 15px 40px; max-width: 600px; margin: 0 auto; }
        
        /* إحصائيات متقدمة بأسهم */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .stat-card h4 { margin: 0; font-size: 18px; color: var(--primary); display: flex; align-items: center; gap: 5px; }
        .stat-card p { margin: 2px 0 0; font-size: 10px; color: #94a3b8; }
        .up-arrow { color: #22c55e; font-size: 12px; }

        .section-header { display: flex; align-items: center; gap: 8px; margin: 25px 0 12px; color: var(--accent); font-weight: bold; font-size: 15px; }
        .section-header::after { content: ''; flex-grow: 1; height: 1px; background: rgba(246, 135, 179, 0.2); }

        /* إعلان سطري مضغوط */
        .ad-row { background: var(--card); padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--primary); }
        .ad-info { display: flex; flex-direction: column; flex-grow: 1; min-width: 0; }
        .ad-title { font-size: 14px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ad-meta { font-size: 10px; color: #94a3b8; margin-top: 2px; }
        .btn-go { background: var(--primary); color: white; padding: 6px 15px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; margin-left: 5px; transition: 0.2s; }

        .post-card { background: rgba(30, 41, 59, 0.4); padding: 10px; border-radius: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; border: 1px solid rgba(255,255,255,0.03); }
    </style>
</head>
<body>

    <div class="header-nav">
        <div class="ticker-wrap"><div class="ticker-text" id="ticker-content">...</div></div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><h4><span id="active-count">0</span> <span class="up-arrow">▲</span></h4><p>إعلانات نشطة الآن</p></div>
            <div class="stat-card"><h4>104k+ <span class="up-arrow">▲</span></h4><p>إجمالي المستخدمين</p></div>
            <div class="stat-card"><h4><span id="today-posts">0</span></h4><p>منشورات اليوم</p></div>
            <div class="stat-card"><h4><span id="week-posts">0</span></h4><p>نشاط هذا الأسبوع</p></div>
        </div>

        <div class="section-header">الإعلانات المباشرة ⚡</div>
        <div id="ads-list"></div>

        <div class="section-header">آخر التحديثات 🆕</div>
        <div id="posts-list"></div>
    </div>

    <script>
        const dbUrl = "https://sarab-app-84448-default-rtdb.firebaseio.com";

        async function updateUI() {
            try {
                const res = await fetch(`${dbUrl}/.json`);
                const data = await res.json();
                
                if(data.ticker) document.getElementById('ticker-content').innerText = data.ticker.text;

                // تحديث الإعلانات
                const adsList = document.getElementById('ads-list');
                const adsData = data.active_ads || {};
                const keys = Object.keys(adsData);
                document.getElementById('active-count').innerText = keys.length;
                
                let adsHTML = "";
                keys.forEach(k => {
                    const ad = adsData[k];
                    adsHTML += `<div class="ad-row"><div class="ad-info"><span class="ad-title">${ad.title}</span><span class="ad-meta">⌛ ينتهي: ${ad.end_at} | 👁️ ${ad.views || 0}</span></div><a href="${ad.post_url}" class="btn-go">دخول</a></div>`;
                });
                if(adsHTML !== adsList.innerHTML) adsList.innerHTML = adsHTML || "<p style='font-size:11px; opacity:0.5'>لا يوجد إعلانات حالياً</p>";

                // تحديث المنشورات والإحصائيات
                const posts = data.latest_posts || [];
                document.getElementById('today-posts').innerText = posts.length > 5 ? posts.length : 12; // محاكاة لليوم
                document.getElementById('week-posts').innerText = "+" + (posts.length + 85);
                
                const postsList = document.getElementById('posts-list');
                let postsHTML = "";
                posts.reverse().slice(0,6).forEach(p => {
                    postsHTML += `<div class="post-card"><span>📄 ${p.text.substring(0,25)}..</span><a href="${p.url}" style="color:var(--primary); text-decoration:none">عرض</a></div>`;
                });
                if(postsHTML !== postsList.innerHTML) postsList.innerHTML = postsHTML;

            } catch(e) {}
        }
        setInterval(updateUI, 3000);
        updateUI();
    </script>
</body>
</html>
