<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مؤسسة نبيل المصبحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #000; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: #fff; padding-bottom: 90px; }

        /* ترويسة ثابتة */
        .header-fixed { position: sticky; top: 0; background: var(--bg); border-bottom: 2px solid var(--gold); z-index: 1000; padding: 15px; text-align: center; }
        .header-fixed h1 { color: var(--gold); font-size: 20px; }

        /* حل مشكلة الصور: حاوية تضمن الأبعاد */
        .img-container { width: 100%; background: #222; min-height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-container img { width: 100%; height: auto; display: block; object-fit: cover; }

        /* الأقسام */
        .content-sec { display: none; padding: 15px; animation: fadeIn 0.3s ease-in; }
        .content-sec.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* بطاقات الأعمال */
        .post-card { background: var(--card); border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
        .post-info { padding: 12px; border-top: 1px solid var(--gold); }

        /* أزرار التواصل - واضحة جداً */
        .contact-list { display: flex; flex-direction: column; gap: 12px; }
        .contact-link { display: flex; align-items: center; padding: 15px; background: #1a1a1a; border-radius: 10px; text-decoration: none; color: #fff; border: 1px solid #444; }
        .contact-link i { font-size: 24px; margin-left: 15px; width: 30px; }
        .c-wa { color: #25D366; } .c-sn { color: #FFFC00; } .c-tk { color: #fff; }

        /* شريط التنقل السفلي */
        .nav-tab { position: fixed; bottom: 0; width: 100%; background: #080808; border-top: 2px solid var(--gold); display: flex; height: 75px; z-index: 2000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; cursor: pointer; }
        .tab-item.active { color: var(--gold); }
        .tab-item i { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <h1>مؤسسة نبيل المصبحي</h1>
    </div>

    <div id="home" class="content-sec active">
        <div class="post-card">
            <div class="img-container">
                <img src="https://files.catbox.moe/pgisea.webp" onerror="this.src='https://via.placeholder.com/400x300?text=جاري+تحميل+الصورة'">
            </div>
            <div class="post-info">
                <h3>مرحباً بكم</h3>
                <p>مؤسسة نبيل المصبحي للمقاولات وأعمال الديكور - الرياض.</p>
            </div>
        </div>
    </div>

    <div id="works" class="content-sec">
        <h2 style="color:var(--gold); margin-bottom:15px;">🖼️ معرض الأعمال</h2>
        <div class="post-card">
            <div class="img-container"><img src="https://files.catbox.moe/xm6xv8.webp" onerror="this.src='https://via.placeholder.com/400x300?text=الصورة+تحت+المعالجة'"></div>
            <div class="post-info"><p>تنفيذ ديكورات جبسية حديثة مع إنارة مخفية.</p></div>
        </div>
        <div class="post-card">
            <div class="img-container"><img src="https://files.catbox.moe/yp7l4u.webp"></div>
            <div class="post-info"><p>تركيب واجهات زجاجية (سترکشر) بأعلى جودة.</p></div>
        </div>
    </div>

    <div id="contact" class="content-sec">
        <h2 style="color:var(--gold); margin-bottom:15px;">📞 تواصل معنا</h2>
        <div class="contact-list">
            <a href="https://wa.me/966555419231" class="contact-link"><i class="fab fa-whatsapp c-wa"></i> واتساب المؤسسة</a>
            <a href="https://www.snapchat.com/add/nab1g" class="contact-link"><i class="fab fa-snapchat-ghost c-sn"></i> سناب شات</a>
            <a href="https://www.tiktok.com/@pye1t" class="contact-link"><i class="fab fa-tiktok c-tk"></i> تيك توك</a>
            <a href="tel:966555419231" class="contact-link"><i class="fas fa-phone-alt"></i> إتصال مباشر</a>
        </div>
    </div>

    <nav class="nav-tab">
        <div class="tab-item active" onclick="showPage('home', this)"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="tab-item" onclick="showPage('works', this)"><i class="fas fa-th-large"></i>أعمالنا</div>
        <div class="tab-item" onclick="showPage('contact', this)"><i class="fas fa-phone"></i>التواصل</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function showPage(id, el) {
            document.querySelectorAll('.content-sec').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
