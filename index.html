<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة نبيل المصبحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #0b0b0b; --card: #151515; }
        * { box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }

        /* شريط ترحيبي */
        .marquee-container { background: var(--gold); color: #000; padding: 8px 0; font-weight: bold; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 1000; }
        .marquee-text { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* الأقسام */
        .section { padding: 20px; display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .work-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; margin-bottom: 20px; }
        .work-card img { width: 100%; height: auto; display: block; min-height: 200px; background: #222; }
        .card-content { padding: 15px; }

        /* أزرار التنقل */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #050505; border-top: 2px solid var(--gold); display: flex; z-index: 2000; }
        .nav-btn { color: #777; text-align: center; font-size: 11px; cursor: pointer; flex: 1; padding-top: 15px; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* نموذج إضافة منشور جديد */
        .admin-box { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px dashed var(--gold); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; }
        .add-btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-text">✨ مرحباً بكم في مؤسسة نبيل المصبحي للمقاولات العامة وأعمال الديكور ✨</div>
    </div>

    <div id="home-sec" class="section active">
        <h2 style="color:var(--gold)">🏠 الرئيسية</h2>
        <div class="work-card">
            <img src="https://files.catbox.moe/pgisea.webp" loading="lazy">
            <div class="card-content">مؤسسة نبيل المصبحي للمقاولات - خبرة وإتقان.</div>
        </div>
    </div>

    <div id="today-sec" class="section">
        <h2 style="color:var(--gold)">📸 أعمال اليوم</h2>
        
        <div id="admin-ui" style="display:none;" class="admin-box">
            <h4>➕ إضافة عمل جديد</h4>
            <input type="text" id="postImg" placeholder="رابط الصورة">
            <textarea id="postDesc" placeholder="وصف العمل..."></textarea>
            <button class="add-btn" onclick="addNewPost()">نشر في أعمال اليوم</button>
        </div>

        <div id="posts-container">
            <div class="work-card">
                <img src="https://files.catbox.moe/xm6xv8.webp">
                <div class="card-content">بدء أعمال الديكور في مشروع سكني جديد.</div>
            </div>
        </div>
    </div>

    <div id="glass-sec" class="section">
        <h2 style="color:var(--gold)">💎 قسم الزجاج</h2>
        <div class="work-card"><img src="https://files.catbox.moe/yp7l4u.webp"></div>
        <div class="work-card"><img src="https://files.catbox.moe/pgisea.webp"></div>
    </div>

    <div id="iron-sec" class="section">
        <h2 style="color:var(--gold)">🛠️ قسم الحديد</h2>
        <div style="text-align:center; padding:50px; color:#666;">
            <i class="fas fa-tools" style="font-size:40px"></i><br>قريباً
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="showSec('home-sec', this)"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="nav-btn" onclick="showSec('today-sec', this)"><i class="fas fa-calendar-day"></i>أعمال اليوم</div>
        <div class="nav-btn" onclick="showSec('glass-sec', this)"><i class="fas fa-gem"></i>الزجاج</div>
        <div class="nav-btn" onclick="showSec('iron-sec', this)"><i class="fas fa-hard-hat"></i>الحديد</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // إظهار واجهة الإدارة إذا كنت المالك
        if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.id === 7660779461) {
            document.getElementById('admin-ui').style.display = 'block';
        }

        function showSec(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function addNewPost() {
            const img = document.getElementById('postImg').value;
            const desc = document.getElementById('postDesc').value;
            if(!img) return alert("يرجى وضع رابط الصورة");

            const container = document.getElementById('posts-container');
            const newCard = `
                <div class="work-card">
                    <img src="${img}">
                    <div class="card-content">${desc}</div>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', newCard);
            
            // إرسال البيانات للبوت لحفظها (اختياري)
            tg.sendData(JSON.stringify({action: "new_post", img: img, text: desc}));
        }
    </script>
</body>
</html>
