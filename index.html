<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب - اللوحة العامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; }
        
        /* الهيدر والصورة */
        .header { text-align: center; margin-bottom: 30px; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); margin-bottom: 15px; }
        .header h1 { font-size: 22px; color: #b794f4; margin: 0; }
        .header p { color: #94a3b8; font-size: 13px; }

        /* قسم الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 20px; text-align: center; border-bottom: 3px solid #6366f1; }
        .stat-card h2 { margin: 0; color: #818cf8; font-size: 28px; }
        .stat-card p { margin: 5px 0 0; color: #94a3b8; font-size: 12px; }

        /* قسم الإعلانات والمنشورات */
        .section-title { font-size: 16px; margin: 25px 0 15px; color: #f687b3; border-right: 4px solid #f687b3; padding-right: 10px; display: flex; align-items: center; }
        
        .ad-list { display: flex; flex-direction: column; gap: 12px; }
        .ad-card { 
            background: #1e293b; padding: 15px; border-radius: 18px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #334155; transition: 0.3s;
        }
        .ad-card:hover { border-color: #6366f1; }
        .ad-info strong { font-size: 14px; display: block; color: #e2e8f0; }
        .ad-info span { font-size: 11px; color: #64748b; }

        .btn-view { 
            background: #6366f1; color: white; padding: 10px 18px; 
            border-radius: 12px; text-decoration: none; font-size: 12px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }
        .btn-view:active { transform: scale(0.95); }

        /* لودر التحميل */
        #loading { text-align: center; color: #64748b; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://files.catbox.moe/5s7y7a.png" alt="Logo" class="logo">
        <h1>روليت سراب 🔥</h1>
        <p>📊 لوحة الإحصائيات والإعلانات المعتمدة</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h2>32</h2><p>📦 إجمالي السحوبات</p></div>
        <div class="stat-card"><h2>16</h2><p>🔥 سحب نشط</p></div>
        <div class="stat-card" style="grid-column: span 2;"><h2>841</h2><p>👥 إجمالي المشاركين</p></div>
    </div>

    <div class="section-title">📢 الإعلانات والمنشورات النشطة</div>
    
    <div id="ad-container" class="ad-list">
        <div id="loading">جاري تحديث القائمة...</div>
    </div>

    <script>
        // رابط قاعدة البيانات (يجب وضعه هنا ليعمل الربط)
        const DB_URL = "https://your-project-default-rtdb.firebaseio.com/posts.json";

        async function fetchAds() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                const container = document.getElementById('ad-container');
                container.innerHTML = ""; // مسح المحتوى القديم

                if (!data) {
                    container.innerHTML = "<p style='text-align:center; color:#64748b;'>لا توجد إعلانات نشطة حالياً.</p>";
                    return;
                }

                // تحويل البيانات وعرضها
                Object.keys(data).reverse().forEach(key => {
                    const ad = data[key];
                    container.innerHTML += `
                        <div class="ad-card">
                            <div class="ad-info">
                                <strong>${ad.text}</strong>
                                <span>👁 مشاهدات نشطة</span>
                            </div>
                            <a href="${ad.link}" target="_blank" class="btn-view">فتح المنشور</a>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
            }
        }

        // تحديث القائمة كل 10 ثوانٍ تلقائياً
        fetchAds();
        setInterval(fetchAds, 10000);
    </script>
</body>
</html>
