<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة روليت سراب - النسخة الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #f687b3; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* الشريط العلوي */
        .ticker-wrap { background: linear-gradient(90deg, var(--primary), #a855f7); padding: 5px 0; position: fixed; top: 0; width: 100%; z-index: 2000; height: 50px; display: flex; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.4); }
        .ticker { white-space: nowrap; overflow: hidden; flex-grow: 1; font-weight: bold; }
        .ticker-text { display: inline-block; animation: ticker 20s linear infinite; padding-right: 50px; }
        .ticker-btn { background: white; color: var(--primary); padding: 5px 15px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; margin: 0 10px; z-index: 2001; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { padding: 80px 15px 20px; text-align: center; }
        .logo { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 10px; }

        /* قسم الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; border-bottom: 3px solid var(--accent); }
        .stat-card h3 { margin: 0; font-size: 22px; color: var(--primary); }
        .stat-card p { margin: 5px 0 0; font-size: 11px; color: #94a3b8; }

        /* العناوين */
        .section-title { text-align: right; color: var(--accent); border-right: 4px solid var(--accent); padding-right: 10px; margin: 30px 0 15px; font-weight: bold; font-size: 18px; }

        /* الإعلانات (متعددة) */
        .ad-item { background: var(--card); padding: 15px; border-radius: 18px; border-right: 5px solid var(--primary); margin-bottom: 15px; text-align: right; animation: fadeIn 0.5s ease; }
        .ad-meta { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-top: 10px; border-top: 1px solid #334155; padding-top: 8px; }
        .btn-ad { background: var(--primary); color: white; padding: 10px; border-radius: 10px; text-decoration: none; display: block; text-align: center; margin-top: 12px; font-weight: bold; font-size: 13px; }

        /* المنشورات الحديثة */
        .post-item { background: #161e2d; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3748; }
        .post-item span { font-size: 13px; color: #cbd5e1; }
        .btn-view { color: var(--primary); text-decoration: none; font-size: 12px; border: 1px solid var(--primary); padding: 4px 10px; border-radius: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker"><div class="ticker-text" id="ticker-content">جاري التحديث...</div></div>
        <a href="#" id="ticker-link" class="ticker-btn">مشاهدة 👁️</a>
    </div>

    <div class="container">
        <img src="https://files.catbox.moe/5s7y7a.png" class="logo">
        <h1 style="margin:0; font-size: 24px;">روليت سراب 🔥</h1>

        <div class="stats-grid">
            <div class="stat-card"><h3><span id="total-views">0</span></h3><p>إجمالي الزيارات</p></div>
            <div class="stat-card"><h3><span id="active-ads-count">0</span></h3><p>إعلانات نشطة</p></div>
        </div>

        <div class="section-title">🕒 إعلانات الروليت (النشطة)</div>
        <div id="ads-container">
            <p style="color: #64748b;">لا توجد إعلانات حالياً...</p>
        </div>

        <div class="section-title">🆕 أحدث المنشورات</div>
        <div id="posts-container">
            <p style="color: #64748b;">جاري جلب المنشورات...</p>
        </div>
    </div>

    <script>
        const dbUrl = "https://sarab-app-84448-default-rtdb.firebaseio.com";

        async function updateUI() {
            try {
                // 1. تحديث الشريط
                const tRes = await fetch(`${dbUrl}/ticker.json`);
                const tData = await tRes.json();
                if(tData) {
                    document.getElementById('ticker-content').innerText = tData.text;
                    document.getElementById('ticker-link').href = tData.link || "#";
                }

                // 2. تحديث الإعلانات النشطة (حتى 5)
                const aRes = await fetch(`${dbUrl}/active_ads.json`);
                const ads = await aRes.json();
                const container = document.getElementById('ads-container');
                container.innerHTML = "";
                
                let count = 0;
                if(ads) {
                    Object.keys(ads).forEach(key => {
                        const ad = ads[key];
                        count++;
                        container.innerHTML += `
                            <div class="ad-item">
                                <strong>📢 ${ad.title}</strong>
                                <div class="ad-meta">
                                    <span>👁️ ${ad.views || 0}</span>
                                    <span style="color: #f687b3;">ينتهي في: ${ad.end_at}</span>
                                </div>
                                <a href="${ad.post_url}" class="btn-ad" onclick="incAdView('${key}', ${ad.views || 0})">دخول السحب 🔓</a>
                            </div>`;
                    });
                }
                document.getElementById('active-ads-count').innerText = count;
                if(count === 0) container.innerHTML = "<p>لا توجد إعلانات نشطة</p>";

                // 3. أحدث المنشورات
                const pRes = await fetch(`${dbUrl}/latest_posts.json`);
                const posts = await pRes.json();
                const pContainer = document.getElementById('posts-container');
                pContainer.innerHTML = "";
                if(posts) {
                    posts.reverse().slice(0, 10).forEach(post => {
                        pContainer.innerHTML += `
                            <div class="post-item">
                                <span>📄 ${post.text.substring(0, 30)}...</span>
                                <a href="${post.url}" class="btn-view">عرض</a>
                            </div>`;
                    });
                }

                // إجمالي الزيارات (تجريبي)
                document.getElementById('total-views').innerText = Math.floor(Math.random() * 100) + 104000;

            } catch(e) {}
        }

        async function incAdView(id, current) {
            await fetch(`${dbUrl}/active_ads/${id}/views.json`, { method: 'PUT', body: JSON.stringify(current + 1) });
        }

        setInterval(updateUI, 3000);
        updateUI();
    </script>
</body>
</html>
