<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة سراب الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #f687b3; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* شريط علوي أنيق */
        .header-nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 2000; border-bottom: 1px solid rgba(99, 102, 241, 0.2); }
        .ticker-wrap { background: linear-gradient(90deg, var(--primary), #a855f7); height: 35px; display: flex; align-items: center; overflow: hidden; }
        .ticker-text { white-space: nowrap; animation: ticker 25s linear infinite; font-size: 13px; font-weight: bold; width: 100%; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { padding: 100px 15px 40px; max-width: 600px; margin: 0 auto; }
        .logo-area { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .logo { width: 60px; height: 60px; border-radius: 15px; border: 2px solid var(--primary); }

        /* إحصائيات بلمسة تقنية */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .stat-box { background: var(--card); padding: 12px; border-radius: 15px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box::after { content: '→'; position: absolute; left: 10px; top: 10px; opacity: 0.2; font-size: 20px; }
        .stat-box h3 { margin: 0; font-size: 20px; color: var(--primary); }
        .stat-box p { margin: 2px 0 0; font-size: 11px; color: #94a3b8; }

        .section-header { display: flex; align-items: center; gap: 10px; margin: 25px 0 15px; color: var(--accent); font-weight: bold; }
        .section-header::before { content: ''; height: 2px; width: 20px; background: var(--accent); border-radius: 2px; }

        /* إعلان سطري (مضغوط) */
        .ad-row { background: var(--card); padding: 12px 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--primary); transition: 0.3s; }
        .ad-info { display: flex; flex-direction: column; gap: 2px; flex-grow: 1; }
        .ad-title { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .ad-timer { font-size: 10px; color: #22c55e; }
        .btn-action { background: var(--primary); color: white; padding: 8px 16px; border-radius: 10px; text-decoration: none; font-size: 12px; font-weight: bold; margin-right: 10px; }

        /* منشورات حديثة مرتبة */
        .post-card { background: rgba(30, 41, 59, 0.5); padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border: 1px dashed rgba(255,255,255,0.1); }
        .post-card:hover { border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="header-nav">
        <div class="ticker-wrap"><div class="ticker-text" id="ticker-content">...</div></div>
    </div>

    <div class="container">
        <div class="logo-area">
            <img src="https://files.catbox.moe/5s7y7a.png" class="logo">
            <div style="text-align: right">
                <h2 style="margin:0; font-size: 20px;">روليت سراب <span style="font-size: 12px; opacity: 0.6;">PRO</span></h2>
                <p style="margin:0; font-size: 11px; color: #94a3b8;">متصل الآن بالخادم الرئيسي عبر Firebase</p>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box"><h3>104k+</h3><p>مستخدم نشط</p></div>
            <div class="stat-box"><h3 id="active-count">0</h3><p>إعلانات مباشرة</p></div>
        </div>

        <div class="section-header">الإعلانات النشطة</div>
        <div id="ads-list"></div>

        <div class="section-header">آخر التحديثات</div>
        <div id="posts-list"></div>
    </div>

    <script>
        const dbUrl = "https://sarab-app-84448-default-rtdb.firebaseio.com";

        async function updateData() {
            try {
                const res = await fetch(`${dbUrl}/.json`);
                const data = await res.json();
                
                // تحديث الشريط بدون مسح
                if(data.ticker) document.getElementById('ticker-content').innerText = data.ticker.text;

                // تحديث الإعلانات (مقارنة ذكية لتجنب الاهتزاز)
                const adsList = document.getElementById('ads-list');
                const adsData = data.active_ads || {};
                const adsKeys = Object.keys(adsData);
                document.getElementById('active-count').innerText = adsKeys.length;

                let adsHTML = "";
                adsKeys.forEach(key => {
                    const ad = adsData[key];
                    adsHTML += `
                        <div class="ad-row">
                            <div class="ad-info">
                                <span class="ad-title">${ad.title}</span>
                                <span class="ad-timer">⌛ ينتهي: ${ad.end_at} | 👁️ ${ad.views || 0}</span>
                            </div>
                            <a href="${ad.post_url}" class="btn-action">دخول →</a>
                        </div>`;
                });
                if(adsHTML !== adsList.innerHTML) adsList.innerHTML = adsHTML || "<p style='font-size:12px; opacity:0.5'>لا يوجد إعلانات حالياً</p>";

                // تحديث المنشورات
                const postsList = document.getElementById('posts-list');
                let postsHTML = "";
                (data.latest_posts || []).reverse().slice(0,8).forEach(post => {
                    postsHTML += `
                        <div class="post-card">
                            <span style="opacity:0.8">📄 ${post.text.substring(0,25)}...</span>
                            <a href="${post.url}" style="color:var(--primary); text-decoration:none; font-weight:bold">عرض</a>
                        </div>`;
                });
                if(postsHTML !== postsList.innerHTML) postsList.innerHTML = postsHTML;

            } catch(e) { console.log("Sync..."); }
        }

        setInterval(updateData, 3000);
        updateData();
    </script>
</body>
</html>
