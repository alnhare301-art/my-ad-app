<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .roulette-img { width: 100%; max-width: 300px; border-radius: 15px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #e63946; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <img src="https://files.catbox.moe/5s7y7a.png" class="roulette-img">
    <h2>مرحباً بك في روليت سراب 🎉</h2>
    <div class="grid">
        <button class="btn" onclick="send('create_roulette')">📝 إنشاء روليت</button>
        <button class="btn" onclick="send('request_ad')">📢 طلب إعلان</button>
        <button class="btn" onclick="send('my_stats')">📊 إحصائياتي</button>
        <button class="btn" onclick="send('support')">🎧 الدعم</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        function send(action) {
            tg.sendData(action); // هذه الخطوة هي التي ترسل الأمر للبوت
            tg.close();
        }
    </script>
</body>
</html>
