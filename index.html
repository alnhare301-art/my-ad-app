<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعلان ويب مصغر</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .ad-card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 80%;
        }
        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="ad-card">
        <h2>📢 إعلان مميز</h2>
        <p id="ad-text">مرحباً بك في تطبيق الويب الخاص بالبوت!</p>
        <button onclick="Telegram.WebApp.close()">إغلاق التطبيق</button>
    </div>

    <script>
        // إخبار تليجرام أن التطبيق جاهز
        Telegram.WebApp.ready();
        Telegram.WebApp.expand(); // فتح التطبيق بكامل الشاشة
    </script>
</body>
</html>
