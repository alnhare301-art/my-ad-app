<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | NEON VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-purple: #a855f7; --neon-cyan: #22d3ee; --dark-bg: #07070b; --card-bg: #11111d; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: #e2e8f0; margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        /* الشريط العلوي */
        .top-header { position: fixed; top: 0; width: 100%; height: 45px; background: rgba(7, 7, 11, 0.9); backdrop-filter: blur(10px); z-index: 2000; display: flex; align-items: center; border-bottom: 1px solid rgba(168, 85, 247, 0.2); }
        .ticker-wrap { flex-grow: 1; overflow: hidden; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); height: 100%; display: flex; align-items: center; }
        .ticker-move { white-space: nowrap; animation: ticker-kf 25s linear infinite; font-weight: 900; font-size: 13px; color: #000; }
        @keyframes ticker-kf { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .btn-top-view { background: #fff; color: #000; text-decoration: none; padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: 900; font-size: 11px; }

        .container { padding: 65px 15px 20px; max-width: 500px; margin: 0 auto; }

        /* الشعار النبضي */
        .brand-box { text-align: center; margin-bottom: 30px; }
        .logo-ring { 
            width: 90px; height: 90px; border-radius: 50%; padding: 3px; 
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
            display: inline-block; animation: neon-pulse 2s ease-in-out infinite;
        }
        @keyframes neon-pulse { 0%, 100% { box-shadow: 0 0 10px var(--neon-purple); transform: scale(1); } 50% { box-shadow: 0 0 20px var(--neon-cyan); transform: scale(1.03); } }
        .logo-img { width: 100%; height: 100%; border-radius: 50%; background: var(--dark-bg); object-fit: cover; }

        /* كروت الإحصائيات */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 20px; text-align: center; }
        .stat-card h2 { margin: 0; color: var(--neon-cyan); font-size: 26px; font-weight: 900; text-shadow: 0 0 10px rgba(34, 211, 238, 0.3); }
        .stat-card p { margin: 3px 0 0; font-size: 11px; opacity: 0.6; }

        /* الأزرار */
        .btn-nav-main {
            background: linear-gradient(135deg, var(--neon-purple), #6366f1);
            color: white; border: none; width: 100%; padding: 14px; border-radius: 15px;
            font-family: 'Cairo'; font-weight: 800; font-size: 15px; cursor: pointer; margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3);
        }

        /* المنشورات */
        .title-label { font-weight: 900; font-size: 16px; color: var(--neon-purple); margin-bottom: 12px; border-right: 4px solid var(--neon-purple); padding-right: 10px; }
        .card-post { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.03);
            padding: 15px; border-radius: 20px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            position: relative; transition: 0.3s;
        }
        .card-post:hover { border-color: var(--neon-purple); }

        .p-info b { font-size: 14px; color: #fff; display: block; }
        .p-info span { font-size: 10px; color: #84849a; margin-top: 3px; display: flex; gap: 8px; }
        .views-tag { color: var(--neon-cyan); font-weight: 900; }

        .dot-btn { color: #4b5563; font-size: 22px; cursor: pointer; padding: 0 10px; }
        .btn-go { background: #fff; color: #000; padding: 6px 15px; border-radius: 10px; text-decoration: none; font-size: 11px; font-weight: 900; }

        /* قائمة الثلاث نقاط */
        .pop-menu {
            display: none; position: absolute; left: 50px; top: 45px; background: #1e1e2e; 
            border: 1px solid var(--neon-purple); border-radius: 12px; z-index: 100; min-width: 110px;
        }
        .pop-item { padding: 10px; font-size: 12px; cursor: pointer; color: #fff; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* القائمة السفلية */
        .bottom-bar { 
            position: fixed; bottom: 0; width: 100%; background: #07070b; 
            display: flex; justify-content: space-around; padding: 15px 0; 
            border-top: 1px solid rgba(168, 85, 247, 0.1); z-index: 3000;
        }
        .nav-link { color: #4b5563; text-decoration: none; font-size: 11px; text-align: center; font-weight: bold; }
        .nav-link.active { color: var(--neon-purple); }
        .nav-link i { display: block; font-size: 22px; margin-bottom: 4px; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="ticker-wrap"><div class="ticker-move" id="ticker-text">🚀 روليت سراب: جاري مزامنة البيانات...</div></div>
        <a href="#" id="ticker-url" class="btn-top-view">عرض الرابط</a>
    </div>

    <div class="container">
        <div id="tab-home" class="tab-panel active">
            <div class="brand-box">
                <div class="logo-ring"><img src="https://files.catbox.moe/5s7y7a.png" class="logo-img"></div>
                <h2 style="margin-top:10px; font-weight:900;">روليت سراب <span style="color:var(--neon-purple)">VIP</span></h2>
            </div>

            <div class="stats-row">
                <div class="stat-card"><h2>104k+</h2><p>مشارك نشط</p></div>
                <div class="stat-card"><h2 id="ads-count">0</h2><p>إعلان ممول</p></div>
            </div>

            <button class="btn-nav-main" onclick="openArchive()">📂 الأرشيف الكامل للمنشورات</button>

            <div class="title-label">📢 منشورات ممولة</div>
            <div id="ads-list"></div>
        </div>

        <div id="tab-archive" class="tab-panel">
            <div class="title-label">📑 أرشيف المنشورات (الأحدث فوق)</div>
            <div id="posts-list"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="nav-link active" id="nav-home" onclick="switchTab('tab-home', this)"><i>🏠</i>الرئيسية</div>
        <div class="nav-link" id="nav-archive" onclick="switchTab('tab-archive', this)"><i>📑</i>المنشورات</div>
        <a href="https://t.me/Gift_News" class="nav-link"><i>📣</i>القناة</a>
        <a href="https://t.me/ttsnn" class="nav-link"><i>📢</i>قناتنا</a>
    </div>

    <script>
        const dbURL = "https://sarab-app-84448-default-rtdb.firebaseio.com";
        let lastDataHash = ""; 

        function switchTab(id, el) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
        function openArchive() { switchTab('tab-archive', document.getElementById('nav-archive')); }
        function toggleMenu(idx) {
            const m = document.getElementById('m-'+idx);
            const isVisible = m.style.display === 'block';
            document.querySelectorAll('.pop-menu').forEach(menu => menu.style.display = 'none');
            m.style.display = isVisible ? 'none' : 'block';
        }

        async function refreshData() {
            try {
                const res = await fetch(`${dbURL}/.json`);
                const data = await res.json();
                
                // التأكد من وجود تغيير قبل إعادة بناء الصفحة (لمنع الرمشة)
                const currentHash = JSON.stringify(data);
                if (currentHash === lastDataHash) return;
                lastDataHash = currentHash;

                if(data.ticker) {
                    document.getElementById('ticker-text').innerText = data.ticker.text;
                    document.getElementById('ticker-url').href = data.ticker.link || "#";
                }

                // الإعلانات الممولة
                const adsArea = document.getElementById('ads-list');
                const ads = data.active_ads || {};
                const adKeys = Object.keys(ads).reverse();
                document.getElementById('ads-count').innerText = adKeys.length;

                let adsHTML = "";
                adKeys.slice(0, 5).forEach(k => {
                    const ad = ads[k];
                    adsHTML += `<div class="card-post">
                        <div class="p-info"><b>${ad.title}</b><span><span class="views-tag">👁️ ${ad.views || 0}</span> | ينتهي: ${ad.end_at}</span></div>
                        <a href="${ad.post_url}" class="btn-go">دخول</a>
                    </div>`;
                });
                adsArea.innerHTML = adsHTML || "<p style='text-align:center; opacity:0.2'>لا توجد إعلانات حالياً</p>";

                // أرشيف المنشورات (الأحدث فوق)
                const postsArea = document.getElementById('posts-list');
                let postsHTML = "";
                (data.latest_posts || []).reverse().forEach((p, i) => {
                    postsHTML += `<div class="card-post">
                        <div class="p-info"><b>📄 ${p.text.substring(0,35)}...</b><span>تم النشر حديثاً</span></div>
                        <div style="display:flex; align-items:center;">
                            <a href="${p.url}" class="btn-go" style="background:transparent; color:var(--neon-purple); border:1px solid var(--neon-purple)">فتح</a>
                            <div class="dot-btn" onclick="toggleMenu(${i})">⋮</div>
                            <div class="pop-menu" id="m-${i}">
                                <div class="pop-item" onclick="alert('تم الإبلاغ')">⚠️ إبلاغ</div>
                                <div class="pop-item" onclick="alert('منشور موثق برقم تسلسلي')">ℹ️ تفاصيل</div>
                            </div>
                        </div>
                    </div>`;
                });
                postsArea.innerHTML = postsHTML;

            } catch(e) {}
        }

        document.addEventListener('click', (e) => { if(!e.target.classList.contains('dot-btn')) document.querySelectorAll('.pop-menu').forEach(m => m.style.display='none'); });
        setInterval(refreshData, 3000);
        refreshData();
    </script>
</body>
</html>
