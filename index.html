<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; margin: 0; }
        .roulette-img { width: 100%; max-width: 250px; border-radius: 20px; border: 2px solid #e63946; margin-bottom: 20px; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 400px; margin: auto; }
        .btn { 
            background: #1f1f1f; color: white; border: 1px solid #333; padding: 20px 10px; 
            border-radius: 15px; font-weight: bold; cursor: pointer; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { background: #e63946; transform: scale(0.95); }
        .icon { font-size: 24px; }
    </style>
</head>
<body>
    <img src="https://files.catbox.moe/5s7y7a.png" class="roulette-img">
    <h3>مرحباً بك في روليت سراب 🎉</h3>
    
    <div class="grid">
        <a href="https://t.me/Smileettbot?start=create" class="btn">
            <span class="icon">📝</span>
            <span>إنشاء روليت</span>
        </a>
        <a href="https://t.me/Smileettbot?start=stats" class="btn">
            <span class="icon">📊</span>
            <span>إحصائياتي</span>
        </a>
        <a href="https://t.me/Smileettbot?start=ads" class="btn">
            <span class="icon">📢</span>
            <span>طلب إعلان</span>
        </a>
        <a href="https://t.me/Smileettbot?start=help" class="btn">
            <span class="icon">🎧</span>
            <span>الدعم الفني</span>
        </a>
    </div>
</body>
</html>
