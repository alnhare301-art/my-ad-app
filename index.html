<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب - الإحصائيات</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; padding: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; text-align: center; border-bottom: 3px solid #6366f1; }
        .card h2 { color: #818cf8; font-size: 30px; margin: 0; }
        
        .section-title { font-size: 16px; margin: 20px 0; color: #94a3b8; border-right: 3px solid #f687b3; padding-right: 10px; }
        
        .ad-item { 
            background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .views { color: #f687b3; font-size: 12px; font-weight: bold; }
        .btn-view { background: #334155; color: white; padding: 8px 12px; border-radius: 10px; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>
    <div style="text-align:center; margin-bottom:25px;">
        <h2 style="color:#b794f4; margin:0;">روليت سراب 🔥</h2>
        <p style="color:#64748b; font-size:12px;">لوحة الإحصائيات والمنشورات الأخيرة</p>
    </div>

    <div class="stat-grid">
        <div class="card"><h2>32</h2><p>إجمالي السحوبات</p></div>
        <div class="card"><h2>16</h2><p>سحب نشط</p></div>
    </div>

    <div class="section-title">🕒 أحدث المنشورات والإعلانات</div>

    <div id="latest-ads">
        <div class="ad-item">
            <div>
                <strong>قناة سراب للمسابقات</strong><br>
                <small style="color:#64748b;">منذ 5 دقائق</small>
            </div>
            <div style="text-align:center;">
                <span class="views">👁 841 مشاهدة</span><br>
                <a href="#" class="btn-view">فتح المنشور</a>
            </div>
        </div>
    </div>
</body>
</html>
