<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خصائص الزر | روليت سراب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #1a222c; --card: #242f3d; --primary: #50a7ea; --gold: #D4AF37; --danger: #e53935; --success: #4caf50; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .modal { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #3d4b5a; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-size: 14px; color: #8ba3b7; }
        select, input { width: 100%; padding: 12px; background: #17212b; border: 1px solid #3d4b5a; color: white; border-radius: 8px; box-sizing: border-box; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 10px; background: #17212b; padding: 10px; border-radius: 8px; }
        .emoji-item { font-size: 20px; text-align: center; cursor: pointer; padding: 5px; border-radius: 5px; }
        .emoji-item:hover { background: var(--primary); }
        .footer-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--success); color: white; }
        .btn-delete { background: var(--danger); color: white; }
    </style>
</head>
<body>
    <div class="modal">
        <div class="header">
            <span style="font-weight: bold;">خصائص الزر</span>
            <span onclick="window.location.reload()" style="cursor:pointer">✕</span>
        </div>

        <label>نوع الزر</label>
        <select id="btnType">
            <option value="url">رابط</option>
            <option value="callback">تفاعل (بوت)</option>
        </select>

        <label>اسم الزر</label>
        <input type="text" id="btnTxt" placeholder="أدخل نص الزر...">

        <label>رابط</label>
        <input type="text" id="btnUrl" placeholder="https://...">

        <label>لون الخلفية</label>
        <select id="btnColor">
            <option value="transparent">شفاف</option>
            <option value="blue">أزرق ملكي</option>
            <option value="purple">أرجواني</option>
        </select>

        <label>تعيين رمز تعبيري مميز</label>
        <div class="emoji-grid">
            <span class="emoji-item" onclick="addEmoji('➕')">➕</span>
            <span class="emoji-item" onclick="addEmoji('👀')">👀</span>
            <span class="emoji-item" onclick="addEmoji('💎')">💎</span>
            <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
            <span class="emoji-item" onclick="addEmoji('📢')">📢</span>
            <span class="emoji-item" onclick="addEmoji('🎁')">🎁</span>
        </div>

        <div class="footer-btns">
            <button class="btn btn-save" onclick="saveAndSend()">حفظ</button>
            <button class="btn btn-delete" onclick="tg.close()">مسح</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function addEmoji(e) {
            document.getElementById('btnTxt').value += e;
        }

        function saveAndSend() {
            const data = {
                text: document.getElementById('btnTxt').value,
                url: document.getElementById('btnUrl').value,
                type: document.getElementById('btnType').value,
                color: document.getElementById('btnColor').value
            };
            
            if(!data.text || !data.url) return alert("يرجى ملء كافة الحقول");
            
            // نرسل البيانات كمصفوفة صفوف كما يتوقع البوت
            tg.sendData(JSON.stringify([{ buttons: [data] }]));
            tg.close();
        }
    </script>
</body>
</html>
