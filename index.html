<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | Silver Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-blue: #1e293b; --accent-blue: #38bdf8; --silver: #e2e8f0; --bg-dark: #020617; 
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: var(--silver); margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        /* الشريط العلوي */
        .top-nav { position: fixed; top: 0; width: 100%; height: 45px; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(15px); z-index: 2000; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ticker-box { flex-grow: 1; overflow: hidden; background: linear-gradient(90deg, #0ea5e9, #6366f1); height: 100%; display: flex; align-items: center; }
        .ticker-msg { white-space: nowrap; animation: ticker-kf 25s linear infinite; font-weight: bold; font-size: 13px; color: white; }
        @keyframes ticker-kf { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .view-link { background: #fff; color: #000; text-decoration: none; padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: 900; font-size: 11px; }

        .container { padding: 65px 15px 20px; max-width: 500px; margin: 0 auto; }

        /* الهيدر */
        .brand-section { text-align: center; margin-bottom: 25px; }
        .logo-wrap { 
            width: 90px; height: 90px; border-radius: 50%; padding: 3px; 
            background: linear-gradient(135deg, var(--accent-blue), #fff);
            display: inline-block; animation: pulse-blue 3s ease-in-out infinite;
        }
        .logo-img { width: 100%; height: 100%; border-radius: 50%; background: var(--bg-dark); object-fit: cover; }
        @keyframes pulse-blue { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); opacity: 0.9; } }

        /* الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; text-align: center; }
        .stat-item h2 { margin: 0; color: var(--accent-blue); font-size: 24px; font-weight: 900; }
        .stat-item p { margin: 3px 0 0; font-size: 10px; opacity: 0.6; }

        /* زر التبويب */
        .btn-tab-trigger {
            background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent-blue);
            color: var(--accent-blue); width: 100%; padding: 12px; border-radius: 15px;
            font-family: 'Cairo'; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 25px;
        }

        /* المنشورات */
        .section-head { font-weight: 800; font-size: 15px; color: var(--accent-blue); margin-bottom: 12px; padding-right: 10px; border-right: 3px solid var(--accent-blue); }
        .post-card { 
            background: #0f172a; border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 18px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
            position: relative; animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .post-info b { font-size: 13px; color: #f1f5f9; display: block; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .post-info span { font-size: 10px; color: #64748b; margin-top: 2px; display: block; }
        
        .post-actions { display: flex; align-items: center; gap: 12px; }
        .more-btn { color: #64748b; font-size: 20px; cursor: pointer; padding: 5px; }
        .go-btn { background: var(--accent-blue); color: #000; padding: 5px 15px; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: 800; }

        /* القائمة المنسدلة للثلاث نقاط */
        .dropdown-menu {
            display: none; position: absolute; left: 40px; top: 40px; background: #1e293b; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; z-index: 100; min-width: 100px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }
        .dropdown-item { padding: 8px 12px; font-size: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--accent-blue); }

        /* القائمة السفلية */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #020617; 
            display: flex; justify-content: space-around; padding: 15px 0; 
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 3000;
        }
        .nav-link { color: #475569; text-decoration: none; font-size: 10px; text-align: center; font-weight: bold; }
        .nav-link.active { color: var(--accent-blue); }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 3px; }

        .view-panel { display: none; }
        .view-panel.active { display: block; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="ticker-box"><div class="ticker-msg" id="ticker-text">جارٍ تحديث البيانات من سيرفر سراب...</div></div>
        <a href="#" id="ticker-url" class="view-link">زيارة 🌐</a>
    </div>

    <div class="container">
        <div id="home-view" class="view-panel active">
            <div class="brand-section">
                <div class="logo-wrap"><img src="https://files.catbox.moe/5s7y7a.png" class="logo-img"></div>
                <h2 style="margin:8px 0 0; font-weight: 900;">سراب <span style="color:var(--accent-blue)">VIP</span></h2>
            </div>

            <div class="stats-grid">
                <div class="stat-item"><h2>104k+</h2><p>مستخدم نشط</p></div>
                <div class="stat-item"><h2 id="ads-count">0</h2><p>إعلانات ممولة</p></div>
            </div>

            <button class="btn-tab-trigger" onclick="openArchive()">📂 الأرشيف الكامل للمنشورات</button>

            <div class="section-head">🔥 إعلانات مميزة</div>
            <div id="featured-list"></div>
        </div>

        <div id="archive-view" class="view-panel">
            <div class="section-head">📑 المنشورات المضافة حديثاً</div>
            <div id="all-posts-list"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link active" id="btn-home" onclick="changeTab('home-view', this)"><i>🏠</i>الرئيسية</div>
        <div class="nav-link" id="btn-archive" onclick="changeTab('archive-view', this)"><i>📑</i>المنشورات</div>
        <a href="https://t.me/Gift_News" class="nav-link"><i>📣</i>القناة</a>
        <a href="https://t.me/ttsnn" class="nav-link"><i>📢</i>قناتنا</a>
    </div>

    <script>
        const db = "https://sarab-app-84448-default-rtdb.firebaseio.com";

        function changeTab(id, el) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function openArchive() { changeTab('archive-view', document.getElementById('btn-archive')); }

        function toggleMenu(id) {
            const m = document.getElementById('menu-'+id);
            const isVisible = m.style.display === 'block';
            document.querySelectorAll('.dropdown-menu').forEach(menu => menu.style.display = 'none');
            m.style.display = isVisible ? 'none' : 'block';
        }

        async function updateSite() {
            try {
                const res = await fetch(`${db}/.json`);
                const data = await res.json();
                
                if(data.ticker) {
                    document.getElementById('ticker-text').innerText = data.ticker.text;
                    document.getElementById('ticker-url').href = data.ticker.link || "#";
                }

                // الممولة (أحدث 5)
                const fList = document.getElementById('featured-list');
                const ads = data.active_ads || {};
                const keys = Object.keys(ads).reverse();
                document.getElementById('ads-count').innerText = keys.length;

                let fHTML = "";
                keys.slice(0, 5).forEach(k => {
                    const ad = ads[k];
                    fHTML += `<div class="post-card">
                        <div class="post-info"><b>${ad.title}</b><span>👁️ ${ad.views || 0} مشاهدة | ينتهي: ${ad.end_at}</span></div>
                        <a href="${ad.post_url}" class="go-btn">دخول</a>
                    </div>`;
                });
                fList.innerHTML = fHTML || "<p style='text-align:center; opacity:0.3'>لا يوجد إعلانات</p>";

                // الكل (الأحدث أولاً + الثلاث نقاط)
                const pList = document.getElementById('all-posts-list');
                let pHTML = "";
                (data.latest_posts || []).reverse().forEach((p, idx) => {
                    pHTML += `<div class="post-card">
                        <div class="post-info"><b>📄 ${p.text.substring(0,30)}...</b><span>منذ قليل</span></div>
                        <div class="post-actions">
                            <a href="${p.url}" class="go-btn" style="background:transparent; color:var(--accent-blue); border:1px solid var(--accent-blue)">فتح</a>
                            <div class="more-btn" onclick="toggleMenu(${idx})">⋮</div>
                            <div class="dropdown-menu" id="menu-${idx}">
                                <div class="dropdown-item" onclick="alert('تم استلام إبلاغك')">⚠️ إبلاغ</div>
                                <div class="dropdown-item" onclick="alert('منشور موثق من روليت سراب')">ℹ️ تفاصيل</div>
                            </div>
                        </div>
                    </div>`;
                });
                pList.innerHTML = pHTML;

            } catch(e) {}
        }

        document.addEventListener('click', (e) => { if(!e.target.classList.contains('more-btn')) document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display='none'); });
        setInterval(updateSite, 3000);
        updateSite();
    </script>
</body>
</html>
