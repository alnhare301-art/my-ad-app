<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | السلطة المطلقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000; /* أسود داكن */
            --card: #0a0a0a; /* أسود غامق */
            --primary: #7C3AED; /* أرجواني */
            --gold: #D4AF37; /* ذهبي */
            --success: #22C55E; --text: #E5E7EB; --text-dim: #94A3B8;
        }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-top: 75px; padding-bottom: 90px; }

        header {
            position: fixed; top: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 2000; border-bottom: 2px solid var(--gold);
        }

        .promo-banner {
            margin: 10px 15px; background: linear-gradient(90deg, #4c1d95, #7C3AED);
            border-radius: 12px; height: 48px; display: flex; align-items: center;
            overflow: hidden; position: relative; border: 1px solid var(--gold);
        }

        .stat-box { background: var(--card); padding: 12px 5px; border-radius: 12px; text-align: center; border: 1px solid var(--gold); }
        .stat-box h4 { margin: 0; color: var(--primary); font-size: 18px; font-weight: 900; }

        .item-card { 
            background: var(--card); border-radius: 16px; padding: 14px; margin: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--gold); border-right: 6px solid var(--primary);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.1);
        }

        .btn-action { 
            background: var(--primary); color: white; border: 1px solid var(--gold); 
            padding: 9px 18px; border-radius: 10px; font-weight: 800; cursor: pointer;
        }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: #000; border-top: 2px solid var(--gold);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 11px; font-weight: 700; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        #main-wheel { width: 280px; height: 280px; border-radius: 50%; border: 8px solid var(--gold); margin: 20px auto; background: url('https://files.catbox.moe/5s7y7a.png') center/cover; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
    </style>
</head>
<body>
    <header>
        <div class="logo-area"><img src="https://files.catbox.moe/5s7y7a.png" style="width:40px; border:1px solid var(--gold); border-radius:8px;"> <span style="font-weight:900; color:var(--gold);">روليت سراب</span></div>
    </header>

    <div id="home-view">
        <div class="promo-banner"><marquee style="color:white; font-weight:bold; width:100%;" id="promo-msg">🔥 أهلاً بكم في النسخة الملكية من روليت سراب..</marquee></div>
        
        <div style="display:flex; gap:10px; padding: 0 15px;">
            <button class="btn-action" style="flex:1" onclick="initChart()">📊 الإحصائيات</button>
            <button class="btn-action" style="flex:1; background:var(--gold); color:#000">🎁 سحوباتي</button>
        </div>

        <div class="stats-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:15px;">
            <div class="stat-box"><h4>104</h4><p>سحب</p></div>
            <div class="stat-box"><h4>24k</h4><p>مشارك</p></div>
            <div class="stat-box"><h4>1k</h4><p>فائز</p></div>
            <div class="stat-box"><h4>99%</h4><p>تحقق</p></div>
        </div>

        <div id="ads-area"></div>
        <div id="posts-area"></div>
    </div>

    <div id="wheel-view" style="display:none; text-align:center;">
        <h2 style="color:var(--gold);">عجلة الحظ الملكية 🎡</h2>
        <div id="main-wheel"></div>
        <button class="btn-action" onclick="startSpin()">إلعب الآن 🚀</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchV('home-view')">🏠<br>الرئيسية</div>
        <div class="nav-item" onclick="switchV('wheel-view')">🎡<br>العجلة</div>
        <a href="https://t.me/Gift_News" style="text-decoration:none;" class="nav-item">📣<br>القناة</a>
    </nav>

    <script>
        function switchV(id) {
            document.getElementById('home-view').style.display = id === 'home-view' ? 'block' : 'none';
            document.getElementById('wheel-view').style.display = id === 'wheel-view' ? 'block' : 'none';
        }
        function startSpin() {
            const w = document.getElementById('main-wheel');
            const deg = Math.floor(Math.random() * 360) + 2000;
            w.style.transform = `rotate(${deg}deg)`;
        }
    </script>
</body>
</html>
