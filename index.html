<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | Luck Wheel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0F172A; --card: #1E293B; --primary: #7C3AED;
            --success: #22C55E; --text: #E5E7EB; --text-dim: #94A3B8; --gold: #fbbf24;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding-top: 70px; padding-bottom: 90px; overflow-x: hidden;
        }

        /* [التنسيقات السابقة للهيدر والقوائم - مدمجة للسرعة] */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-img-small { width: 35px; height: 35px; border-radius: 8px; }
        
        /* --- قسم عجلة الحظ الجديد --- */
        .wheel-section {
            display: none; text-align: center; padding: 20px 15px; animation: fadeIn 0.5s;
        }
        .wheel-container {
            position: relative; width: 280px; height: 280px; margin: 40px auto;
        }
        /* السهم العلوي */
        .wheel-arrow {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 30px solid var(--gold);
            z-index: 10; filter: drop-shadow(0 0 5px var(--gold));
        }
        /* شعار البوت (العجلة) */
        .lucky-wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 8px solid var(--card); box-shadow: 0 0 25px rgba(124, 58, 237, 0.4);
            background: url('https://files.catbox.moe/5s7y7a.png');
            background-size: cover; background-position: center;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); /* دوران واقعي */
        }
        .wheel-btn {
            background: linear-gradient(135deg, var(--primary), #4c1d95);
            color: white; border: none; padding: 15px 40px; border-radius: 50px;
            font-family: 'Cairo'; font-weight: 900; font-size: 18px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-top: 20px;
        }
        .wheel-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* [تنسيقات المحتوى الرئيسي] */
        .main-content { display: block; }
        .promo-banner { margin: 10px 15px; background: linear-gradient(90deg, var(--primary), #4c1d95); border-radius: 12px; height: 45px; display: flex; align-items: center; overflow: hidden; position: relative; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee-kf 15s linear infinite; font-weight: 800; font-size: 13px; color: #fff; white-space: nowrap; }
        @keyframes marquee-kf { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .ad-item { background: var(--card); border-radius: 15px; padding: 12px 15px; margin: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--primary); }
        .btn-inline-action { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 11px; cursor: pointer; }

        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        .nav-item { color: var(--text-dim); text-decoration: none; text-align: center; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://files.catbox.moe/5s7y7a.png" class="logo-img-small">
            <span style="font-weight: 900;">روليت سراب</span>
        </div>
        <div class="user-trigger"><img src="https://files.catbox.moe/5s7y7a.png" style="width:35px; border-radius:50%;"></div>
    </header>

    <div id="wheel-view" class="wheel-section">
        <h2 style="font-weight: 900; color: var(--gold);">عجلة الحظ اليومية 🎰</h2>
        <p style="font-size: 12px; color: var(--text-dim);">جرب حظك الآن واربح جوائز فورية!</p>
        
        <div class="wheel-container">
            <div class="wheel-arrow"></div>
            <div id="main-wheel" class="lucky-wheel"></div>
        </div>

        <button id="spin-btn" class="wheel-btn" onclick="spinWheel()">العب الآن 🚀</button>
        <div id="win-msg" style="margin-top: 20px; font-weight: 800; color: var(--success); min-height: 30px;"></div>
    </div>

    <div id="home-view" class="main-content">
        <div class="promo-banner">
            <div style="width:100%; overflow:hidden;"><span class="marquee-text" id="promo-msg">أهلاً بك في روليت سراب.. جاري جلب المفاجآت!</span></div>
        </div>

        <div class="section-label" style="padding:10px 15px; font-weight:900; color:var(--primary);">💎 سحوبات ممولة</div>
        <div id="ads-area"></div>

        <div class="section-label" style="padding:10px 15px; font-weight:900; color:var(--primary);">📄 أحدث السحوبات</div>
        <div id="posts-area"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showTab('home-view', this)"><i>🏠</i>الرئيسية</div>
        <div class="nav-item" onclick="showTab('wheel-view', this)"><i>🎡</i>العجلة</div>
        <a href="https://t.me/Gift_News" class="nav-item"><i>📣</i>القناة</a>
        <a href="https://t.me/ttsnn" class="nav-item"><i>📢</i>قناتنا</a>
    </nav>

    <script>
        const dbURL = "https://sarab-app-84448-default-rtdb.firebaseio.com";
        let isSpinning = false;

        function showTab(tabId, el) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('wheel-view').style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(tabId).style.display = 'block';
            el.classList.add('active');
        }

        // منطق عجلة الحظ
        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            
            const wheel = document.getElementById('main-wheel');
            const btn = document.getElementById('spin-btn');
            const msg = document.getElementById('win-msg');
            
            msg.innerText = "جاري الدوران...";
            btn.disabled = true;

            // توليد درجة دوران عشوائية (أكثر من 5 دورات كاملة + زاوية عشوائية)
            const randomDegree = Math.floor(Math.random() * 360) + 1800; 
            wheel.style.transform = `rotate(${randomDegree}deg)`;

            setTimeout(() => {
                isSpinning = false;
                btn.disabled = false;
                const prizes = ["مبروك! ربحت 10 نجوم", "حظ أوفر المرة القادمة", "مبروك! اشتراك VIP", "ربحت 5 نجوم", "حاول مجدداً"];
                msg.innerText = prizes[Math.floor(Math.random() * prizes.length)];
                
                // إعادة تصفير الزاوية برفق لاحقاً (اختياري)
            }, 4000);
        }

        async function sync() {
            try {
                const res = await fetch(`${dbURL}/.json`);
                const data = await res.json();
                if(data.ticker) document.getElementById('promo-msg').innerText = data.ticker.text;

                // تحديث الإعلانات
                const adsArea = document.getElementById('ads-area');
                const ads = data.active_ads || {};
                let adsHTML = "";
                Object.keys(ads).reverse().slice(0, 5).forEach(k => {
                    adsHTML += `<div class="ad-item"><div class="item-info"><span class="item-title">${ads[k].title}</span></div><button class="btn-inline-action" onclick="window.location.href='${ads[k].post_url}'">شارك</button></div>`;
                });
                adsArea.innerHTML = adsHTML;

                // تحديث المنشورات
                const postsArea = document.getElementById('posts-area');
                let postsHTML = "";
                (data.latest_posts || []).reverse().slice(0, 10).forEach(p => {
                    postsHTML += `<div class="ad-item" style="border-right-color:var(--success)"><div class="item-info"><span class="item-title">${p.text.substring(0,30)}..</span></div><button class="btn-inline-action" style="background:var(--success)" onclick="window.location.href='${p.url}'">دخول</button></div>`;
                });
                postsArea.innerHTML = postsHTML;
            } catch(e) {}
        }

        setInterval(sync, 5000);
        sync();
    </script>
</body>
</html>
