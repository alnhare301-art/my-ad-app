<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | VIP Royal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --royal-gold: #b59410; /* ذهبي نحاسي فخم */
            --dark-deep: #050509; /* أسود عميق */
            --card-deep: #0f1016; /* أسود للكروت */
            --neon-glow: #eab308; /* توهج ذهبي */
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--dark-deep); 
            background-image: linear-gradient(180deg, #111119 0%, #050509 100%);
            color: #f3f4f6; 
            margin: 0; 
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* شريط علوي ملكي مضيء */
        .royal-header { 
            position: fixed; top: 0; width: 100%; height: 48px; 
            background: rgba(10, 10, 15, 0.9); 
            backdrop-filter: blur(15px); 
            z-index: 2000; display: flex; align-items: center; 
            border-bottom: 1px solid rgba(181, 148, 16, 0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .ticker-wrap { flex-grow: 1; overflow: hidden; background: linear-gradient(90deg, #c2a118, var(--royal-gold)); height: 100%; display: flex; align-items: center; }
        .ticker-text { white-space: nowrap; animation: ticker-kf 28s linear infinite; font-weight: 800; font-size: 13px; color: #000; }
        @keyframes ticker-kf { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .btn-live-view { background: #fff; color: #000; text-decoration: none; padding: 0 18px; height: 100%; display: flex; align-items: center; font-weight: 900; font-size: 12px; transition: 0.3s; }
        .btn-live-view:hover { background: var(--royal-gold); }

        .container { padding: 75px 15px 20px; max-width: 500px; margin: 0 auto; }

        /* الهيدر الملكي النابض */
        .hero-royal { text-align: center; margin-bottom: 30px; position: relative; }
        .hero-royal::before { content: ''; position: absolute; width: 100px; height: 100px; background: var(--neon-glow); border-radius: 50%; blur: 50px; opacity: 0.1; top: 10px; left: 50%; transform: translateX(-50%); z-index: -1; }
        
        .logo-frame { 
            width: 100px; height: 100px; border-radius: 50%; padding: 4px; 
            background: linear-gradient(45deg, var(--royal-gold), #fff);
            display: inline-block; animation: pulse-royal 2.8s ease-in-out infinite;
        }
        .logo-img { width: 100%; height: 100%; border-radius: 50%; background: var(--dark-deep); object-fit: cover; }
        @keyframes pulse-royal { 0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(181, 148, 16, 0.2); } 50% { transform: scale(1.06); box-shadow: 0 0 25px rgba(234, 179, 8, 0.4); } }

        /* إحصائيات ذهبية */
        .stats-royal { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card-royal { 
            background: var(--card-deep); 
            border: 1px solid rgba(181, 148, 16, 0.1);
            padding: 20px; border-radius: 20px; text-align: center;
            transition: 0.3s;
        }
        .stat-card-royal:hover { border-color: rgba(234, 179, 8, 0.4); transform: translateY(-3px); }
        .stat-card-royal h2 { margin: 0; color: var(--royal-gold); font-size: 28px; text-shadow: 0 0 10px rgba(234, 179, 8, 0.3); font-weight: 900; }
        .stat-card-royal p { margin: 5px 0 0; font-size: 11px; opacity: 0.7; }

        /* زر الإنتقال للمنشورات (فخم) */
        .btn-live-feed {
            background: linear-gradient(135deg, #c2a118, var(--royal-gold));
            color: #000; border: none; width: 100%; padding: 15px; border-radius: 18px;
            font-family: 'Cairo'; font-weight: 900; font-size: 15px; cursor: pointer;
            margin-bottom: 30px; box-shadow: 0 8px 20px rgba(181, 148, 16, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .btn-live-feed:hover { transform: scale(1.02); box-shadow: 0 10px 25px rgba(234, 179, 8, 0.5); }

        /* قسم المنشورات (الأحدث فوق + أنيميشن) */
        .section-label-royal { font-weight: 900; font-size: 17px; color: var(--royal-gold); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .section-label-royal::before { content: '👑'; }

        #all-posts-list { display: flex; flex-direction: column; } /* لضمان ترتيب الأحدث فوق */
        
        .royal-row { 
            background: var(--card-deep); 
            border: 1px solid rgba(181, 148, 16, 0.1);
            padding: 15px 20px; border-radius: 18px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            border-right: 5px solid var(--royal-gold);
            animation: slideInDown 0.5s ease-out; /* أنيميشن للمنشور الجديد */
        }
        @keyframes slideInDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        .info-txt b { font-size: 14px; color: #fff; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 250px; }
        .info-txt span { font-size: 10px; color: #94a3b8; display: flex; gap: 10px; margin-top: 3px; }
        .views-badge { color: var(--neon-glow); font-weight: bold; }

        .btn-action-royal { background: var(--royal-gold); color: #000; padding: 7px 18px; border-radius: 10px; text-decoration: none; font-size: 12px; font-weight: 800; }

        /* القائمة السفلية العائمة الملكية */
        .royal-nav { 
            position: fixed; bottom: 18px; left: 18px; right: 18px;
            background: rgba(10, 10, 15, 0.9); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(181, 148, 16, 0.2);
            border-radius: 25px; display: flex; justify-content: space-around; padding: 14px 0; z-index: 3000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .nav-item-royal { color: #84848d; text-decoration: none; font-size: 11px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .nav-item-royal.active { color: var(--royal-gold); text-shadow: 0 0 5px rgba(234, 179, 8, 0.3); }
        .nav-item-royal i { display: block; font-size: 22px; margin-bottom: 3px; }

        .panel-view { display: none; }
        .panel-view.active { display: block; }
    </style>
</head>
<body>

    <div class="royal-header">
        <div class="ticker-wrap"><div class="ticker-text" id="ticker-text">🔥 روليت سراب: جاري جلب أحدث المنشورات الممولة...</div></div>
        <a href="#" id="ticker-url" class="btn-live-view">مشاهدة 👁️</a>
    </div>

    <div class="container">
        <div id="home-view" class="panel-view active">
            <div class="hero-royal">
                <div class="logo-frame"><img src="https://files.catbox.moe/5s7y7a.png" class="logo-img"></div>
                <h2 style="margin-top:10px; font-weight: 900; font-size: 24px;">روليت سراب <span style="color:var(--royal-gold)">VIP</span></h2>
                <p style="font-size: 11px; opacity: 0.6; margin-top: 3px;">نظام السحوبات المتطور والمنشورات الموثقة</p>
            </div>

            <div class="stats-royal">
                <div class="stat-card-royal"><h2>104k+</h2><p>إجمالي المستخدمين</p></div>
                <div class="stat-card-royal"><h2 id="ads-count">0</h2><p>إعلانات ممولة</p></div>
            </div>

            <button class="btn-live-feed" onclick="goToPosts()">📑 الخلاصة الإخبارية الحية</button>

            <div class="section-label-royal">📢 المنشورات الممولة</div>
            <div id="featured-ads"></div>
        </div>

        <div id="posts-view" class="panel-view">
            <div class="section-label-royal">📄 الخلاصة الحية (الأحدث فوق)</div>
            <div id="all-posts-list"></div>
        </div>
    </div>

    <div class="royal-nav">
        <div class="nav-item-royal active" id="home-btn" onclick="tabSwitch('home-view', this)"><i>🏠</i>الرئيسية</div>
        <div class="nav-item-royal" id="posts-btn" onclick="tabSwitch('posts-view', this)"><i>📑</i>المنشورات</div>
        <a href="https://t.me/Gift_News" class="nav-item-royal"><i>📣</i>أخبار الروليت</a>
        <a href="https://t.me/ttsnn" class="nav-item-royal"><i>📢</i>قناتنا</a>
        <a href="https://t.me/Y5_B_B" class="nav-item-royal"><i>🛠️</i>الدعم</a>
    </div>

    <script>
        const dbURL = "https://sarab-app-84448-default-rtdb.firebaseio.com";
        let lastKnownPostCount = 0; // لضمان تحريك الجديد فقط

        function tabSwitch(id, el) {
            document.querySelectorAll('.panel-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item-royal').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        function goToPosts() {
            tabSwitch('posts-view', document.getElementById('posts-btn'));
        }

        async function royalSync() {
            try {
                const res = await fetch(`${dbURL}/.json`);
                const data = await res.json();
                
                // تحديث الشريط العلوي
                if(data.ticker) {
                    document.getElementById('ticker-text').innerText = data.ticker.text;
                    document.getElementById('ticker-url').href = data.ticker.link || "#";
                }

                // المنشورات الممولة (الأحدث فوق + 5 فقط)
                const adsList = document.getElementById('featured-ads');
                const adsData = data.active_ads || {};
                const adsKeys = Object.keys(adsData).reverse();
                document.getElementById('ads-count').innerText = adsKeys.length;

                let adsHTML = "";
                adsKeys.slice(0, 5).forEach(k => {
                    const ad = adsData[k];
                    adsHTML += `
                        <div class="royal-row">
                            <div class="info-txt">
                                <b>${ad.title}</b>
                                <span>⌛ ينتهي: ${ad.end_at} | <span class="views-badge">👁️ ${ad.views || 0}</span></span>
                            </div>
                            <a href="${ad.post_url}" class="btn-action-royal">دخول</a>
                        </div>`;
                });
                adsList.innerHTML = adsHTML || "<p style='text-align:center; opacity:0.3; font-size:12px;'>لا توجد إعلانات حالياً</p>";

                // أحدث المنشورات الحية (الأحدث فوق + أنيميشن للجديد)
                const postsList = document.getElementById('all-posts-list');
                const currentPosts = (data.latest_posts || []).reverse();
                
                // إذا كان هناك منشور جديد، قم بتحديث القائمة
                if(currentPosts.length > lastKnownPostCount) {
                    postsList.innerHTML = ""; // مسح القائمة لإعادة بنائها بالأحدث فوق
                    currentPosts.forEach(p => {
                        postsList.innerHTML += `
                            <div class="royal-row" style="border-right-color: #f3f4f6">
                                <div class="info-txt">
                                    <b>📄 ${p.text.substring(0,35)}...</b>
                                    <span>تم النشر حديثاً</span>
                                </div>
                                <a href="${p.url}" style="color:var(--royal-gold); text-decoration:none; font-weight:bold; font-size:12px;">فتح</a>
                            </div>`;
                    });
                    lastKnownPostCount = currentPosts.length;
                }

            } catch(e) {}
        }

        setInterval(royalSync, 3000); // تحديث سريع كل 3 ثواني لإحساس "الحي"
        royalSync();
    </script>
</body>
</html>
