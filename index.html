<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .container {
            max-width: 400px;
            margin: auto;
        }
        .roulette-img { 
            width: 100%; 
            max-width: 250px; 
            border-radius: 20px; 
            margin-bottom: 15px;
            border: 2px solid #e63946;
        }
        h2 { color: #e63946; margin-bottom: 5px; }
        p { color: #bbb; font-size: 14px; margin-bottom: 25px; }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        .btn { 
            background: #1f1f1f; 
            color: white; 
            border: 1px solid #333; 
            padding: 20px 10px; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .btn:active { 
            background: #e63946; 
            transform: scale(0.95);
        }
        .icon { font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://files.catbox.moe/5s7y7a.png" class="roulette-img">
        <h2>مرحباً بك في روليت سراب 🎉</h2>
        <p>اختر من الخيارات أدناه للتحكم بالبوت</p>

        <div class="grid">
            <button class="btn" onclick="send('create_roulette')">
                <span class="icon">📝</span>
                <span>إنشاء روليت</span>
            </button>
            <button class="btn" onclick="send('request_ad')">
                <span class="icon">📢</span>
                <span>طلب إعلان</span>
            </button>
            <button class="btn" onclick="send('my_stats')">
                <span class="icon">📊</span>
                <span>إحصائياتي</span>
            </button>
            <button class="btn" onclick="send('support')">
                <span class="icon">🎧</span>
                <span>الدعم الفني</span>
            </button>
        </div>
    </div>

    <script>
        // تفعيل تطبيق الويب
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // تمديد الصفحة لتملأ الشاشة

        function send(action) {
            // إرسال البيانات للبوت
            tg.sendData(action); 
            // إغلاق النافذة بعد الإرسال
            tg.close();
        }
    </script>
</body>
</html>
