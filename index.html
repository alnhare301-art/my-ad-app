<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; padding: 20px; text-align: center; }
        .header { margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: #d9534f; color: white; padding: 20px; border-radius: 15px; cursor: pointer; font-weight: bold; border: none; font-size: 14px; }
        .btn:active { background: #b52b27; }
        .roulette-image {
            width: 100%; border-radius: 10px; margin-bottom: 15px; max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://files.catbox.moe/5s7y7a.png" class="roulette-image" alt="روليت سراب">
        <h3>مرحباً بك في روليت سراب 🎉</h3>
    </div>

    <div class="grid">
        <button class="btn" onclick="sendToBot('create_roulette')">📝 إنشاء روليت</button>
        <button class="btn" onclick="sendToBot('request_ad')">📢 طلب إعلان</button>
        <button class="btn" onclick="sendToBot('my_stats')">📊 إحصائياتي</button>
        <button class="btn" onclick="sendToBot('support')">🎧 الدعم الفني</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        // هذه هي الوظيفة التي نختبرها للاتصال
        function sendToBot(action) {
            // إرسال البيانات للبوت وإغلاق الصفحة
            tg.sendData(action); 
            tg.close();
        }
    </script>
</body>
</html>
