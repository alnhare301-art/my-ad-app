<div style="display: flex; justify-content: space-between; align-items: center; background: #1a1d30; padding: 10px 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155;">
    <div style="text-align: right;">
        <span style="color: #94a3b8; font-size: 12px;">رصيدك الحالي</span>
        <h3 id="user-balance" style="margin: 0; color: #f687b3;">0.00$</h3>
    </div>
    <button id="connect-wallet" onclick="connectWallet()" style="background: linear-gradient(45deg, #6366f1, #a855f7); color: white; border: none; padding: 10px 15px; border-radius: 12px; font-family: 'Cairo'; cursor: pointer; font-weight: bold;">
        🔗 ربط المحفظة
    </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script>
    let userWallet = null;

    async function connectWallet() {
        if (window.ethereum) {
            try {
                // طلب الاتصال بالمحفظة (MetaMask مثلاً)
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userWallet = accounts[0];
                
                // تحديث الزر ليظهر أول واخر حرف من المحفظة
                document.getElementById('connect-wallet').innerText = 
                    userWallet.substring(0, 6) + "..." + userWallet.substring(userWallet.length - 4);
                document.getElementById('connect-wallet').style.background = "#22c55e"; // لون أخضر عند النجاح

                // إضافة رصيد تجريبي (مثلاً 50$) عند أول ربط
                document.getElementById('user-balance').innerText = "50.00$";
                alert("✅ تم ربط المحفظة بنجاح! تم إضافة 50$ رصيد ترحيبي.");
                
            } catch (error) {
                alert("❌ فشل الاتصال بالمحفظة.");
            }
        } else {
            alert("⚠️ يرجى تثبيت محفظة MetaMask أو استخدام متصفح يدعم Web3");
        }
    }
</script>
