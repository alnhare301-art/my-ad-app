<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #a855f7; --bg: #030712; --card: #111827; --text: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        /* شريط علوي احترافي مع زر المشاهدة */
        .header-top { position: fixed; top: 0; width: 100%; height: 45px; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(12px); z-index: 2000; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ticker-container { flex-grow: 1; overflow: hidden; background: linear-gradient(90deg, var(--primary), var(--accent)); height: 100%; display: flex; align-items: center; }
        .ticker-move { white-space: nowrap; animation: ticker-kf 22s linear infinite; font-weight: bold; font-size: 13px; padding-right: 50px; }
        @keyframes ticker-kf { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .btn-view { background: #fff; color: #000; text-decoration: none; padding: 0 18px; height: 100%; display: flex; align-items: center; font-weight: 900; font-size: 12px; }

        .container { padding: 65px 15px 20px; max-width: 500px; margin: 0 auto; }

        /* الشعار (توسيع وتصغير خفيف) */
        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-ring { width: 95px; height: 95px; border-radius: 50%; padding: 4px; background: linear-gradient(45deg, var(--primary), var(--accent)); display: inline-block; animation: pulseEffect 2.5s ease-in-out infinite; }
        .main-img { width: 100%; height: 100%; border-radius: 50%; background: var(--bg); object-fit: cover; }
        @keyframes pulseEffect { 0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(99, 102, 241, 0.2); } 50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(168, 85, 247, 0.5); } }

        /* إحصائيات سراب الخاصة */
        .stats-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-box { background: var(--card); padding: 18px; border-radius: 22px; text-align: center; border: 1px solid rgba(255,255,255,0.03); position: relative; }
        .stat-box h2 { margin: 0; color: var(--primary); font-size: 26px; font-weight: 900; }
        .stat-box p { margin: 4px 0 0; font-size: 11px; opacity: 0.6; }
        .stat-box::before { content: '▲'; position: absolute; left: 12px; top: 12px; font-size: 10px; color: #22c55e; }

        /* تبويبات المحتوى */
        .content-section { display: none; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .label-title { font-weight: 900; font-size: 16px; color: var(--accent); margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }

        /* الإعلانات (الأحدث أولاً + تنسيق سطري) */
        .item-row { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 14px 18px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--primary); }
        .item-info b { font-size: 14px; display: block; color: #fff; }
        .item-info span { font-size: 10px; color: #94a3b8; }
        .btn-link { background: var(--primary); color: white; padding: 7px 16px; border-radius: 12px; text-decoration: none; font-size: 12px; font-weight: 700; }

        /* القائمة السفلية */
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.08); z-index: 3000; }
        .nav-btn { color: #64748b; text-decoration: none; font-size: 11px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); transform: translateY(-3px); }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="ticker-container">
            <div class="ticker-move" id="ticker-text">🔥 روليت سراب: جاري مزامنة أحدث البيانات من القناة...</div>
        </div>
        <a href="#" id="ticker-url" class="btn-view">مشاهدة 👁️</a>
    </div>

    <div class="container">
        <div id="main-tab" class="content-section active">
            <div class="logo-area">
                <div class="logo-ring">
                    <img src="https://files.catbox.moe/5s7y7a.png" class="main-img">
                </div>
                <h3 style="margin:12px 0 0; font-weight: 900;">روليت سراب <span style="color:var(--primary)">VIP</span></h3>
            </div>

            <div class="stats-wrap">
                <div class="stat-box"><h2>104k+</h2><p>إجمالي المستخدمين</p></div>
                <div class="stat-box"><h2 id="active-ads-val">0</h2><p>إعلانات نشطة</p></div>
            </div>

            <div class="label-title">📢 المنشورات الممولة (الأحدث)</div>
            <div id="featured-ads-list"></div>
        </div>

        <div id="posts-tab" class="content-section">
            <div class="label-title">📄 أرشيف المنشورات الأخير</div>
            <div id="all-posts-container"></div>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-btn active" onclick="switchTab('main-tab', this)"><i>🏠</i>الرئيسية</div>
        <div class="nav-btn" onclick="switchTab('posts-tab', this)"><i>📑</i>المنشورات</div>
        <a href="https://t.me/Gift_News" class="nav-btn"><i>📣</i>القناة</a>
        <a href="https://t.me/Y5_B_B" class="nav-btn"><i>🛠️</i>الدعم</a>
    </div>

    <script>
        const dbSource = "https://sarab-app-84448-default-rtdb.firebaseio.com";

        function switchTab(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function syncContent() {
            try {
                const res = await fetch(`${dbSource}/.json`);
                const data = await res.json();
                
                // تحديث الشريط العلوي
                if(data.ticker) {
                    document.getElementById('ticker-text').innerText = data.ticker.text;
                    document.getElementById('ticker-url').href = data.ticker.link || "#";
                }

                // المنشورات الممولة (حد أقصى 5 والأحدث أولاً)
                const adsContainer = document.getElementById('featured-ads-list');
                const adsData = data.active_ads || {};
                const keys = Object.keys(adsData).reverse();
                document.getElementById('active-ads-val').innerText = keys.length;

                let adsHTML = "";
                keys.slice(0, 5).forEach(k => {
                    const ad = adsData[k];
                    adsHTML += `
                        <div class="item-row">
                            <div class="item-info">
                                <b>${ad.title}</b>
                                <span>⌛ ينتهي: ${ad.end_at} | 👁️ ${ad.views || 0}</span>
                            </div>
                            <a href="${ad.post_url}" class="btn-link">دخول</a>
                        </div>`;
                });
                adsContainer.innerHTML = adsHTML || "<p style='text-align:center; opacity:0.3; font-size:12px;'>لا توجد إعلانات حالياً</p>";

                // كافة المنشورات (تبويب المنشورات)
                const allPostsBox = document.getElementById('all-posts-container');
                let postsHTML = "";
                (data.latest_posts || []).reverse().forEach(p => {
                    postsHTML += `
                        <div class="item-row" style="border-right-color: var(--accent)">
                            <div class="item-info">
                                <b>${p.text.substring(0,35)}...</b>
                                <span>تم النشر حديثاً</span>
                            </div>
                            <a href="${p.url}" style="color:var(--accent); text-decoration:none; font-weight:bold; font-size:12px;">فتح</a>
                        </div>`;
                });
                allPostsBox.innerHTML = postsHTML;

            } catch(e) { console.log("Re-syncing..."); }
        }

        setInterval(syncContent, 3000);
        syncContent();
    </script>
</body>
</html>
