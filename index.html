<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | الإحصائيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-purple: #8b5cf6; --neon-blue: #3b82f6; --dark-bg: #0f172a; --card-bg: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; padding-bottom: 90px; }

        /* الشريط العلوي مع زر المشاهدة */
        .header-strip { position: fixed; top: 0; width: 100%; height: 45px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 2000; display: flex; align-items: center; border-bottom: 1px solid rgba(139, 92, 246, 0.3); }
        .ticker-container { flex-grow: 1; overflow: hidden; background: linear-gradient(90deg, var(--main-purple), var(--neon-blue)); height: 100%; display: flex; align-items: center; }
        .ticker-content { white-space: nowrap; animation: ticker-kf 20s linear infinite; font-weight: bold; font-size: 13px; }
        @keyframes ticker-kf { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .watch-btn { background: #fff; color: #000; text-decoration: none; padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: 900; font-size: 12px; }

        .container { padding: 65px 15px 20px; max-width: 500px; margin: 0 auto; }

        /* الشعار المتحرك */
        .logo-wrap { text-align: center; margin-bottom: 30px; }
        .logo-frame { width: 100px; height: 100px; border-radius: 50%; padding: 5px; background: linear-gradient(45deg, var(--main-purple), var(--neon-blue)); display: inline-block; animation: rotateFrame 4s linear infinite; }
        .main-logo { width: 100%; height: 100%; border-radius: 50%; background: var(--dark-bg); object-fit: cover; }
        @keyframes rotateFrame { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* كروت الإحصائيات (مثل الصورة المرفقة) */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card h2 { margin: 0; color: var(--main-purple); font-size: 28px; }
        .stat-card p { margin: 5px 0 0; font-size: 11px; opacity: 0.7; }

        /* شريط الرسم البياني */
        .chart-box { background: var(--card-bg); padding: 15px; border-radius: 20px; margin-bottom: 25px; }
        .chart-title { font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

        /* الأقسام (تبويبات) */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* الإعلانات الممولة (5 فقط) */
        .ad-item { background: linear-gradient(90deg, #2e1065, #1e293b); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--main-purple); }
        .ad-info b { font-size: 14px; display: block; }
        .ad-info span { font-size: 10px; color: var(--neon-blue); }

        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111827; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(259, 92, 246, 0.2); z-index: 3000; }
        .nav-link { color: #64748b; text-decoration: none; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-link.active { color: var(--main-purple); }
        .nav-link i { display: block; font-size: 22px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header-strip">
        <div class="ticker-container">
            <div class="ticker-content" id="ticker-text">🚀 جاري تحميل البيانات...</div>
        </div>
        <a href="#" id="ticker-url" class="watch-btn">عرض 👁️</a>
    </div>

    <div class="container">
        <div id="home-tab" class="tab-content active">
            <div class="logo-wrap">
                <div class="logo-frame">
                    <img src="https://files.catbox.moe/5s7y7a.png" class="main-logo">
                </div>
                <h3 style="margin:10px 0 0;">روليت سراب <span style="color:var(--main-purple)">PRO</span></h3>
            </div>

            <div class="stats-container">
                <div class="stat-card"><h2 id="total-users">104k</h2><p>👥 إجمالي المشاركين</p></div>
                <div class="stat-card"><h2 id="ads-count-val">0</h2><p>🔥 سحب نشط</p></div>
            </div>

            <div class="chart-box">
                <div class="chart-title">📈 نشاط السحوبات (آخر 7 أيام)</div>
                <canvas id="myChart" height="150"></canvas>
            </div>

            <div style="color:var(--main-purple); font-weight:bold; margin-bottom:10px;">🏆 الأقوى (بالمشاركة)</div>
            <div id="featured-ads"></div>
        </div>

        <div id="posts-tab" class="tab-content">
            <h3 style="color:var(--neon-blue)">📄 أحدث المنشورات</h3>
            <div id="all-posts-list"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link active" onclick="showTab('home-tab', this)"><i>🏠</i>الرئيسية</div>
        <div class="nav-link" onclick="showTab('posts-tab', this)"><i>📄</i>المنشورات</div>
        <a href="https://t.me/Gift_News" class="nav-link"><i>📢</i>القناة</a>
    </div>

    <script>
        const dbUrl = "https://sarab-app-84448-default-rtdb.firebaseio.com";

        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        async function updateData() {
            try {
                const res = await fetch(`${dbUrl}/.json`);
                const data = await res.json();
                
                // التيكر
                if(data.ticker) {
                    document.getElementById('ticker-text').innerText = data.ticker.text;
                    document.getElementById('ticker-url').href = data.ticker.link || "#";
                }

                // المنشورات الممولة (الأحدث فوق + حد أقصى 5)
                const adsArea = document.getElementById('featured-ads');
                const adsData = data.active_ads || {};
                const keys = Object.keys(adsData).reverse();
                document.getElementById('ads-count-val').innerText = keys.length;

                let adsHTML = "";
                keys.slice(0, 5).forEach(k => {
                    const ad = adsData[k];
                    adsHTML += `
                        <div class="ad-item">
                            <div class="ad-info">
                                <b>${ad.title}</b>
                                <span>⌛ ينتهي: ${ad.end_at}</span>
                            </div>
                            <a href="${ad.post_url}" style="background:var(--main-purple); color:white; padding:5px 15px; border-radius:10px; text-decoration:none; font-size:12px;">عرض</a>
                        </div>`;
                });
                adsArea.innerHTML = adsHTML;

                // أحدث المنشورات
                const postsList = document.getElementById('all-posts-list');
                let postsHTML = "";
                (data.latest_posts || []).reverse().forEach(p => {
                    postsHTML += `<div class="ad-item" style="border-left-color:var(--neon-blue)"><b>${p.text.substring(0,30)}..</b><a href="${p.url}" style="color:var(--neon-blue); text-decoration:none">فتح</a></div>`;
                });
                postsList.innerHTML = postsHTML;

            } catch(e) {}
        }

        // رسم بياني محاكي للصورة
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['12-19', '12-21', '12-23', '12-25'],
                datasets: [{
                    label: 'عدد السحوبات',
                    data: [2, 1, 17, 3],
                    borderColor: '#8b5cf6',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(139, 92, 246, 0.1)'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
        });

        setInterval(updateData, 3000);
        updateData();
    </script>
</body>
</html>
