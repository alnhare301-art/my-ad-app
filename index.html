<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنسيق الأزرار</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #111827; --card: #1f2937; --primary: #3b82f6; --text: #f3f4f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        
        .row-box { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #374151; position: relative; }
        .row-label { font-size: 12px; color: #9ca3af; margin-bottom: 10px; display: block; }
        
        .btn-list { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .btn-item { 
            background: #374151; padding: 8px 12px; border-radius: 8px; font-size: 13px;
            border: 1px solid transparent; display: flex; align-items: center; gap: 5px;
        }
        /* الألوان الجانبية للأزرار */
        .color-red { border-right: 4px solid #ef4444; }
        .color-blue { border-right: 4px solid #3b82f6; }
        .color-green { border-right: 4px solid #10b981; }

        .add-side-btn { background: none; border: 1px dashed #4b5563; color: #9ca3af; padding: 8px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 13px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #111827; border: 1px solid #374151; color: #fff; border-radius: 8px; font-family: 'Cairo'; }
        
        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-family: 'Cairo'; margin-top: 10px; cursor: pointer; }
        .save-all { background: #10b981; color: white; margin-top: 30px; }
        .add-row { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <h3 style="text-align: center;">تنسيق أزرار المنشور</h3>
    
    <div id="builder-container">
        </div>

    <button class="main-btn add-row" onclick="createNewRow()">➕ إضافة صف جديد</button>
    <button class="main-btn save-all" onclick="sendDataToBot()">💾 حفظ وإرسال للبوت</button>

    <div id="btnModal" class="modal">
        <div class="modal-content">
            <h4 style="margin:0 0 15px;">إعدادات الزر الجديد</h4>
            <label>نوع العمل:</label>
            <select id="m-type">
                <option value="url">رابط خارجي (URL)</option>
                <option value="callback">تنبيه منبثقة (Alert)</option>
            </select>
            <input type="text" id="m-text" placeholder="نص الزر (مثلاً: دخول)">
            <input type="text" id="m-val" placeholder="الرابط أو الكود">
            
            <label>لون الزر:</label>
            <select id="m-color">
                <option value="default">شفاف</option>
                <option value="blue">أزرق</option>
                <option value="red">أحمر</option>
                <option value="green">أخضر</option>
            </select>

            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="confirmAddButton()" style="flex:1; background:#10b981; color:white; border:none; padding:10px; border-radius:8px;">إضافة</button>
                <button onclick="closeModal()" style="flex:1; background:#ef4444; color:white; border:none; padding:10px; border-radius:8px;">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let rows = [];
        let activeRowId = null;

        function createNewRow() {
            const rowId = Date.now();
            rows.push({ id: rowId, buttons: [] });
            render();
        }

        function openBtnModal(rowId) {
            activeRowId = rowId;
            document.getElementById('btnModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('btnModal').style.display = 'none';
        }

        function confirmAddButton() {
            const text = document.getElementById('m-text').value;
            const type = document.getElementById('m-type').value;
            const val = document.getElementById('m-val').value;
            const color = document.getElementById('m-color').value;

            if(!text || !val) return alert("يرجى ملء كافة الحقول");

            const row = rows.find(r => r.id === activeRowId);
            row.buttons.push({ text, type, val, color });
            
            closeModal();
            render();
            // تصفير الحقول
            document.getElementById('m-text').value = '';
            document.getElementById('m-val').value = '';
        }

        function render() {
            const container = document.getElementById('builder-container');
            container.innerHTML = '';
            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row-box';
                rowDiv.innerHTML = `
                    <span class="row-label">صف أزرار #${rows.indexOf(row)+1}</span>
                    <div class="btn-list">
                        ${row.buttons.map(b => `<div class="btn-item color-${b.color}">${b.text}</div>`).join('')}
                    </div>
                    <button class="add-side-btn" onclick="openBtnModal(${row.id})">➕ أضف زر بجانبه</button>
                `;
                container.appendChild(rowDiv);
            });
        }

        function sendDataToBot() {
            if(rows.length === 0) return alert("أضف صفاً واحداً على الأقل");
            tg.sendData(JSON.stringify(rows));
        }
    </script>
</body>
</html>
