<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنسيق الأزرار الاحترافي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --gold: #D4AF37; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; padding: 15px; text-align: right; }
        .config-card { background: #0a0a0a; border: 1px solid var(--gold); padding: 15px; border-radius: 12px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .save-btn { background: #10b981; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="config-card">
        <h3 style="color:var(--gold); text-align:center;">🎨 تنسيق الزر (API المطورين)</h3>
        
        <label>نص الزر:</label>
        <input type="text" id="t" placeholder="مثال: اشترك في المسابقة">

        <label>الرابط (URL):</label>
        <input type="text" id="u" placeholder="https://t.me/...">

        <label>نمط الزر (اللون/النوع):</label>
        <select id="s">
            <option value="default">الافتراضي (شفاف)</option>
            <option value="premium">نمط مميز (Premium Style)</option>
            <option value="star">نمط النجوم (Stars/Gold Style)</option>
        </select>

        <button class="save-btn" onclick="submit()">✅ حفظ التنسيق وإرساله</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        function submit() {
            const data = [{
                buttons: [{
                    text: document.getElementById('t').value,
                    url: document.getElementById('u').value,
                    style: document.getElementById('s').value
                }]
            }];
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
