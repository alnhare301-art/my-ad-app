<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مؤسسة نبيل المصبحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: #fff; padding-bottom: 100px; }

        /* شريط الترحيب */
        .header { background: #080808; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .header h1 { color: var(--gold); font-size: 22px; }

        /* الأقسام - جعلتها تظهر تحت بعضها مؤقتاً لضمان رؤيتك لها */
        .section { padding: 20px; border-bottom: 1px solid #222; }
        .sec-title { color: var(--gold); font-size: 18px; margin-bottom: 15px; border-right: 4px solid var(--gold); padding-right: 10px; }

        /* حل مشكلة الصور المكسورة */
        .img-card { background: #111; border-radius: 10px; overflow: hidden; margin-bottom: 15px; border: 1px solid #333; }
        .img-card img { width: 100%; height: auto; display: block; min-height: 150px; background: #222; }
        
        /* أزرار التواصل - واضحة جداً وفي المنتصف */
        .contact-box { background: #111; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; border: 1px solid #444; text-decoration: none; display: block; }
        .contact-box i { font-size: 30px; margin-bottom: 10px; display: block; }
        .wa { color: #25D366; } .sn { color: #FFFC00; } .tk { color: #fff; }

        /* شريط التنقل السفلي - أضفت له خلفية فاقعة للتأكد من رؤيته */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111; border-top: 2px solid var(--gold); display: flex; z-index: 9999; }
        .nav-item { flex: 1; color: #888; text-align: center; font-size: 12px; padding-top: 15px; cursor: pointer; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>مؤسسة نبيل المصبحي للمقاولات</h1>
    </div>

    <div id="home" class="section-content">
        <div class="section">
            <h2 class="sec-title">🏠 الرئيسية</h2>
            <div class="img-card">
                <img src="https://images.weserv.nl/?url=https://files.catbox.moe/pgisea.webp">
            </div>
            <p style="padding:10px;">أهلاً بكم في واجهة مؤسستنا الرسمية.</p>
        </div>
    </div>

    <div id="today" class="section-content" style="display:none;">
        <div class="section">
            <h2 class="sec-title">📸 أعمال اليوم</h2>
            <div class="img-card">
                <img src="https://images.weserv.nl/?url=https://files.catbox.moe/xm6xv8.webp">
            </div>
            <p style="padding:10px;">تنفيذ أعمال ديكور حديثة.</p>
        </div>
    </div>

    <div id="contact" class="section-content" style="display:none;">
        <div class="section">
            <h2 class="sec-title">📞 تواصل معنا</h2>
            <a href="https://wa.me/966555419231" class="contact-box"><i class="fab fa-whatsapp wa"></i><span style="color:#fff">واتساب المؤسسة</span></a>
            <a href="https://www.snapchat.com/add/nab1g" class="contact-box"><i class="fab fa-snapchat-ghost sn"></i><span style="color:#fff">سناب شات</span></a>
            <a href="https://www.tiktok.com/@pye1t" class="contact-box"><i class="fab fa-tiktok tk"></i><span style="color:#fff">تيك توك</span></a>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="nav-item" onclick="showPage('today', this)"><i class="fas fa-camera"></i>أعمال اليوم</div>
        <div class="nav-item" onclick="showPage('contact', this)"><i class="fas fa-phone"></i>التواصل</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(pageId, el) {
            // إخفاء جميع الأقسام
            document.querySelectorAll('.section-content').forEach(s => s.style.display = 'none');
            // إظهار القسم المختار
            document.getElementById(pageId).style.display = 'block';
            
            // تحديث الأزرار
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
