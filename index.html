<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | النظام الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000000; --card: #0a0a0a; --primary: #7C3AED; --gold: #D4AF37; --text: #E5E7EB; --input-bg: #17212b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-top: 65px; padding-bottom: 80px; }
        
        /* الهيدر */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid var(--gold); z-index: 2000; box-sizing: border-box; }
        
        /* واجهة الإحصائيات (الرئيسية) */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 15px; }
        .stat-box { background: var(--card); border: 1px solid var(--gold); border-radius: 12px; padding: 10px; text-align: center; font-size: 10px; }
        .stat-box b { color: var(--primary); display: block; font-size: 14px; }

        /* محرر الأزرار (المودال) */
        #editor-view { display: none; padding: 20px; }
        .editor-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid var(--gold); }
        label { display: block; margin: 15px 0 5px; font-size: 13px; color: var(--gold); }
        input, select { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; }
        
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 10px; background: #111; padding: 10px; border-radius: 10px; }
        .emoji-item { font-size: 20px; text-align: center; cursor: pointer; padding: 5px; }
        .emoji-item:hover { background: var(--primary); border-radius: 5px; }

        /* الأزرار السفلية */
        .main-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; font-family: 'Cairo'; }
        .btn-save { background: #10b981; color: white; border: 1px solid var(--gold); }
        .btn-cancel { background: #333; color: white; margin-top: 10px; }

        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 2px solid var(--gold); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { color: #666; text-align: center; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); transform: scale(1.1); }
    </style>
</head>
<body>
    <header>
        <span style="font-weight:900; color:var(--gold);">روليت سراب VIP</span>
        <img src="https://files.catbox.moe/5s7y7a.png" style="width:35px; border-radius:50%; border:1px solid var(--gold);">
    </header>

    <div id="home-view">
        <div class="stat-grid">
            <div class="stat-box"><b>104k</b>مستخدم</div>
            <div class="stat-box"><b>5.2k</b>سحب</div>
            <div class="stat-box"><b>1.1k</b>فائز</div>
            <div class="stat-box"><b>99%</b>ثقة</div>
        </div>
        <h4 style="padding: 0 15px; color: var(--gold);">💎 إعلانات روليت سراب</h4>
        <div style="padding: 15px; background: var(--card); margin: 15px; border-radius: 12px; border-right: 4px solid var(--primary);">
            📢 قريباً: سحب ملكي على 50,000 نجمة ⭐
        </div>
    </div>

    <div id="editor-view">
        <div class="editor-card">
            <h3 style="margin:0; text-align:center; color:var(--gold);">🎨 خصائص الزر</h3>
            
            <label>نوع الزر</label>
            <select id="btnType">
                <option value="url">رابط خارجي (URL)</option>
                <option value="callback">تفاعل مع البوت (Callback)</option>
            </select>

            <label>اسم الزر (النص الظاهر)</label>
            <input type="text" id="btnTxt" placeholder="مثال: اشترك الآن">

            <label>الرابط أو الكود</label>
            <input type="text" id="btnUrl" placeholder="https://t.me/...">

            <label>لون الزر المميز</label>
            <select id="btnColor">
                <option value="transparent">شفاف (افتراضي)</option>
                <option value="blue">أزرق ملكي</option>
                <option value="purple">أرجواني ملكي</option>
            </select>

            <label>إضافة أيقونة سريعة</label>
            <div class="emoji-grid">
                <span class="emoji-item" onclick="addEmoji('💎')">💎</span>
                <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
                <span class="emoji-item" onclick="addEmoji('🎁')">🎁</span>
                <span class="emoji-item" onclick="addEmoji('📢')">📢</span>
                <span class="emoji-item" onclick="addEmoji('✅')">✅</span>
                <span class="emoji-item" onclick="addEmoji('🚀')">🚀</span>
            </div>

            <button class="main-btn btn-save" onclick="saveAndSend()">✅ حفظ الأزرار والمتابعة</button>
            <button class="main-btn btn-cancel" onclick="tg.close()">إلغاء الأمر</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div id="nav-home" class="nav-item active" onclick="showV('home')">🏠<br>الرئيسية</div>
        <div id="nav-editor" class="nav-item" onclick="showV('editor')">🎨<br>المحرر</div>
        <div class="nav-item">🎡<br>العجلة</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // التبديل التلقائي إذا طلب البوت "المحرر" مباشرة
        if(window.location.search.includes('mode=editor')) { showV('editor'); }

        function showV(v) {
            document.getElementById('home-view').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('editor-view').style.display = v === 'editor' ? 'block' : 'none';
            document.getElementById('nav-home').classList.toggle('active', v === 'home');
            document.getElementById('nav-editor').classList.toggle('active', v === 'editor');
        }

        function addEmoji(e) {
            document.getElementById('btnTxt').value = e + " " + document.getElementById('btnTxt').value;
        }

        function saveAndSend() {
            const txt = document.getElementById('btnTxt').value;
            const url = document.getElementById('btnUrl').value;
            const clr = document.getElementById('btnColor').value;
            
            if(!txt || !url) return alert("يرجى تعبئة الاسم والرابط");

            // إرسال البيانات للبوت كمصفوفة صفوف (النمط الذي يفهمه التلجرام)
            const result = [{
                buttons: [{ text: txt, val: url, color: clr }]
            }];
            
            tg.sendData(JSON.stringify(result));
            tg.close();
        }
    </script>
</body>
</html>
