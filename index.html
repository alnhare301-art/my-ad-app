<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | Liquid Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-neon: #818cf8; 
            --accent-neon: #c084fc;
            --main-bg: #030712;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--main-bg); 
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030712 100%);
            color: #f8fafc; 
            margin: 0; 
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* شريط علوي زجاجي */
        .glass-header { 
            position: fixed; top: 0; width: 100%; height: 45px; 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(15px); 
            z-index: 2000; display: flex; align-items: center; 
            border-bottom: 1px solid var(--glass-border);
        }
        .ticker-wrap { flex-grow: 1; overflow: hidden; background: linear-gradient(90deg, var(--primary-neon), var(--accent-neon)); height: 100%; display: flex; align-items: center; }
        .ticker-text { white-space: nowrap; animation: ticker-kf 25s linear infinite; font-weight: bold; font-size: 13px; }
        @keyframes ticker-kf { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .watch-btn { background: #fff; color: #000; text-decoration: none; padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: 900; font-size: 11px; }

        .container { padding: 70px 15px 20px; max-width: 500px; margin: 0 auto; }

        /* الشعار النابض */
        .hero-section { text-align: center; margin-bottom: 30px; }
        .logo-container { 
            width: 100px; height: 100px; border-radius: 50%; padding: 3px; 
            background: linear-gradient(45deg, var(--primary-neon), var(--accent-neon));
            display: inline-block; animation: pulse-logo 3s ease-in-out infinite;
        }
        .logo-img { width: 100%; height: 100%; border-radius: 50%; background: var(--main-bg); object-fit: cover; }
        @keyframes pulse-logo { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* كروت الإحصائيات الزجاجية */
        .glass-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 24px; text-align: center;
        }
        .glass-card h2 { margin: 0; color: var(--primary-neon); font-size: 26px; text-shadow: 0 0 10px rgba(129, 140, 248, 0.5); }
        .glass-card p { margin: 5px 0 0; font-size: 11px; opacity: 0.7; }

        /* زر أحدث المنشورات في الرئيسية */
        .nav-trigger-btn {
            background: linear-gradient(135deg, var(--primary-neon), var(--accent-neon));
            color: white; border: none; width: 100%; padding: 15px; border-radius: 18px;
            font-family: 'Cairo'; font-weight: 800; font-size: 15px; cursor: pointer;
            margin-bottom: 25px; box-shadow: 0 10px 20px rgba(129, 140, 248, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        /* قوائم المنشورات الزجاجية */
        .section-label { font-weight: 900; font-size: 16px; color: var(--accent-neon); margin-bottom: 12px; border-right: 4px solid var(--accent-neon); padding-right: 10px; }
        .glass-row { 
            background: var(--glass-bg); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 20px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .info-txt b { font-size: 14px; color: #fff; display: block; }
        .info-txt span { font-size: 10px; color: #94a3b8; }
        .action-btn { background: var(--primary-neon); color: #fff; padding: 6px 16px; border-radius: 12px; text-decoration: none; font-size: 12px; font-weight: 700; }

        /* القائمة السفلية الزجاجية */
        .glass-nav { 
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border);
            border-radius: 25px; display: flex; justify-content: space-around; padding: 12px 0; z-index: 3000;
        }
        .nav-link { color: #94a3b8; text-decoration: none; font-size: 11px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--primary-neon); transform: scale(1.1); }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 2px; }

        .tab-panel { display: none; animation: slideUp 0.4s ease; }
        .tab-panel.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="glass-header">
        <div class="ticker-wrap"><div class="ticker-text" id="ticker-text">🔥 روليت سراب: جاري المزامنة...</div></div>
        <a href="#" id="ticker-url" class="watch-btn">عرض 👁️</a>
    </div>

    <div class="container">
        <div id="home-view" class="tab-panel active">
            <div class="hero-section">
                <div class="logo-container"><img src="https://files.catbox.moe/5s7y7a.png" class="logo-img"></div>
                <h2 style="margin-top:10px; font-weight: 900; letter-spacing: 1px;">سراب <span style="color:var(--primary-neon)">VIP</span></h2>
            </div>

            <div class="glass-grid">
                <div class="glass-card"><h2>104k+</h2><p>مستخدم نشط</p></div>
                <div class="glass-card"><h2 id="ads-count">0</h2><p>إعلانات ممولة</p></div>
            </div>

            <button class="nav-trigger-btn" onclick="openPosts()">📑 أحدث المنشورات</button>

            <div class="section-label">📢 منشورات ممولة</div>
            <div id="featured-list"></div>
        </div>

        <div id="posts-view" class="tab-panel">
            <div class="section-label">📄 أحدث التحديثات</div>
            <div id="all-posts-list"></div>
        </div>
    </div>

    <div class="glass-nav">
        <div class="nav-link active" id="home-btn" onclick="switchTab('home-view', this)"><i>🏠</i>الرئيسية</div>
        <div class="nav-link" id="posts-btn" onclick="switchTab('posts-view', this)"><i>📑</i>المنشورات</div>
        <a href="https://t.me/Gift_News" class="nav-link"><i>📣</i>القناة</a>
        <a href="https://t.me/Y5_B_B" class="nav-link"><i>🛠️</i>الدعم</a>
    </div>

    <script>
        const dbPath = "https://sarab-app-84448-default-rtdb.firebaseio.com";

        function switchTab(id, el) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        function openPosts() {
            switchTab('posts-view', document.getElementById('posts-btn'));
        }

        async function sync() {
            try {
                const res = await fetch(`${dbPath}/.json`);
                const data = await res.json();
                
                if(data.ticker) {
                    document.getElementById('ticker-text').innerText = data.ticker.text;
                    document.getElementById('ticker-url').href = data.ticker.link || "#";
                }

                // الممولة
                const adsList = document.getElementById('featured-list');
                const adsData = data.active_ads || {};
                const keys = Object.keys(adsData).reverse();
                document.getElementById('ads-count').innerText = keys.length;

                let adsHTML = "";
                keys.slice(0, 5).forEach(k => {
                    const ad = adsData[k];
                    adsHTML += `<div class="glass-row"><div class="info-txt"><b>${ad.title}</b><span>⌛ ينتهي: ${ad.end_at}</span></div><a href="${ad.post_url}" class="action-btn">دخول</a></div>`;
                });
                adsList.innerHTML = adsHTML || "<p style='text-align:center; opacity:0.3; font-size:12px;'>لا توجد إعلانات</p>";

                // الكل
                const postsList = document.getElementById('all-posts-list');
                let postsHTML = "";
                (data.latest_posts || []).reverse().forEach(p => {
                    postsHTML += `<div class="glass-row" style="border-right-color: var(--accent-neon)"><div class="info-txt"><b>${p.text.substring(0,35)}..</b><span>تم النشر حديثاً</span></div><a href="${p.url}" style="color:var(--accent-neon); text-decoration:none; font-weight:bold; font-size:12px;">فتح</a></div>`;
                });
                postsList.innerHTML = postsHTML;

            } catch(e) {}
        }

        setInterval(sync, 3000);
        sync();
    </script>
</body>
</html>
