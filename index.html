<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | النسخة الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f59e0b; --primary: #6366f1; --bg: #020617; --card: #0f172a; --accent: #10b981; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding-top: 60px; }

        /* شريط علوي احترافي مع زر ثابت */
        .top-bar { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 2000; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ticker-container { flex-grow: 1; overflow: hidden; background: linear-gradient(90deg, #4f46e5, #9333ea); height: 100%; display: flex; align-items: center; }
        .ticker-move { white-space: nowrap; animation: ticker 20s linear infinite; font-weight: 800; font-size: 13px; padding-right: 50px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-action-btn { background: #fff; color: #000; padding: 0 15px; height: 100%; display: flex; align-items: center; text-decoration: none; font-weight: bold; font-size: 12px; border-left: 2px solid var(--bg); }

        .container { padding: 20px 15px; max-width: 500px; margin: 0 auto; }
        
        /* الهيدر والشعار */
        .hero { text-align: center; margin-bottom: 30px; position: relative; }
        .main-logo { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--gold); box-shadow: 0 0 30px rgba(245, 158, 11, 0.3); margin-bottom: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* الإحصائيات بالأسهم */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .stat-item { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); position: relative; }
        .stat-item h4 { margin: 0; font-size: 22px; color: var(--gold); }
        .stat-item p { margin: 2px 0 0; font-size: 11px; color: #94a3b8; }
        .stat-arrow { position: absolute; left: 15px; top: 15px; color: var(--accent); font-weight: bold; }

        /* الأقسام */
        .section-label { display: flex; align-items: center; gap: 10px; margin: 25px 0 15px; font-weight: 800; font-size: 16px; color: var(--gold); }
        .section-label::before { content: '🔥'; }

        /* المنشورات الممولة (بارزة) */
        .featured-ad { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 15px; border-radius: 20px; border-right: 5px solid var(--gold); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .ad-content { display: flex; flex-direction: column; gap: 3px; }
        .ad-title { font-weight: 800; font-size: 15px; color: #fff; }
        .ad-meta { font-size: 10px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .btn-join { background: var(--gold); color: #000; padding: 8px 20px; border-radius: 12px; text-decoration: none; font-weight: 800; font-size: 13px; }

        /* المنشورات الحديثة */
        .recent-post { background: rgba(255,255,255,0.02); padding: 12px 15px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .post-text { font-size: 13px; color: #cbd5e1; }
        .post-link { color: var(--primary); font-weight: bold; text-decoration: none; font-size: 12px; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="ticker-container">
            <div class="ticker-move" id="ticker-text">🚀 جاري تحميل آخر التحديثات من بوت سراب...</div>
        </div>
        <a href="#" id="ticker-btn" class="ticker-action-btn">مشاهدة 👁️</a>
    </div>

    <div class="container">
        <div class="hero">
            <img src="https://files.catbox.moe/5s7y7a.png" class="main-logo">
            <h2 style="margin:0;">روليت سراب <span style="color:var(--gold)">VIP</span></h2>
            <p style="font-size: 11px; opacity: 0.6;">نظام السحوبات المتطور والمنشورات الموثقة</p>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><span class="stat-arrow">▲</span><h4 id="ads-count">0</h4><p>إعلانات ممولة</p></div>
            <div class="stat-item"><span class="stat-arrow">▲</span><h4>104k+</h4><p>مستخدم نشط</p></div>
            <div class="stat-item"><span class="stat-arrow">▲</span><h4 id="today-stats">0</h4><p>منشورات اليوم</p></div>
            <div class="stat-item"><span class="stat-arrow">▲</span><h4>98%</h4><p>نسبة الثقة</p></div>
        </div>

        <div class="section-label">المنشورات الممولة</div>
        <div id="featured-ads-area">
            </div>

        <div class="section-label">أحدث المنشورات</div>
        <div id="latest-posts-area">
            </div>
    </div>

    <script>
        const dbUrl = "https://sarab-app-84448-default-rtdb.firebaseio.com";

        async function syncUI() {
            try {
                const res = await fetch(`${dbUrl}/.json`);
                const data = await res.json();
                
                // 1. الشريط العلوي
                if(data.ticker) {
                    document.getElementById('ticker-text').innerText = data.ticker.text;
                    document.getElementById('ticker-btn').href = data.ticker.link || "#";
                }

                // 2. المنشورات الممولة (المميزة)
                const adsArea = document.getElementById('featured-ads-area');
                const adsData = data.active_ads || {};
                const keys = Object.keys(adsData);
                document.getElementById('ads-count').innerText = keys.length;
                
                let adsHTML = "";
                keys.forEach(k => {
                    const ad = adsData[k];
                    adsHTML += `
                        <div class="featured-ad">
                            <div class="ad-content">
                                <span class="ad-title">${ad.title}</span>
                                <div class="ad-meta">
                                    <span>⏳ ينتهي: ${ad.end_at}</span>
                                    <span>👁️ ${ad.views || 0}</span>
                                </div>
                            </div>
                            <a href="${ad.post_url}" class="btn-join">دخول 🔓</a>
                        </div>`;
                });
                adsArea.innerHTML = adsHTML || "<p style='text-align:center; opacity:0.3'>لا توجد إعلانات ممولة حالياً</p>";

                // 3. أحدث المنشورات
                const postsArea = document.getElementById('latest-posts-area');
                const posts = data.latest_posts || [];
                document.getElementById('today-stats').innerText = posts.length + 5;
                
                let postsHTML = "";
                posts.reverse().slice(0, 7).forEach(p => {
                    postsHTML += `
                        <div class="recent-post">
                            <span class="post-text">📄 ${p.text.substring(0, 30)}...</span>
                            <a href="${p.url}" class="post-link">عرض التفاصيل</a>
                        </div>`;
                });
                postsArea.innerHTML = postsHTML;

            } catch(e) { console.log("Updating..."); }
        }

        setInterval(syncUI, 3000);
        syncUI();
    </script>
</body>
</html>
