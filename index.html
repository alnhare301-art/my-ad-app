<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب - اللوحة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #f687b3; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 20px; line-height: 1.6; }
        
        /* الهيدر والشعار */
        .header { text-align: center; margin-bottom: 30px; animation: fadeIn 1s ease; }
        .logo { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--primary); box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); margin-bottom: 15px; object-fit: cover; }
        .header h1 { font-size: 24px; color: #b794f4; margin: 0; }
        .header p { color: #94a3b8; font-size: 13px; }

        /* شبكة الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border-bottom: 4px solid var(--primary); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h2 { margin: 0; color: #818cf8; font-size: 32px; }
        .stat-card p { margin: 5px 0 0; color: #94a3b8; font-size: 12px; font-weight: bold; }

        /* قسم الإعلانات والمنشورات */
        .section-header { display: flex; align-items: center; gap: 10px; margin: 25px 0 15px; border-right: 4px solid var(--secondary); padding-right: 12px; }
        .section-title { font-size: 17px; color: #e2e8f0; font-weight: bold; }
        
        .ad-list { display: flex; flex-direction: column; gap: 12px; }
        .ad-card { 
            background: var(--card); padding: 18px; border-radius: 18px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #334155; animation: slideIn 0.5s ease;
        }
        .ad-info { flex: 1; }
        .ad-info strong { font-size: 15px; display: block; color: #f8fafc; margin-bottom: 4px; }
        .ad-info span { font-size: 11px; color: var(--secondary); font-weight: bold; display: flex; align-items: center; gap: 4px; }

        .btn-view { 
            background: linear-gradient(45deg, var(--primary), #818cf8); color: white; 
            padding: 10px 20px; border-radius: 12px; text-decoration: none; 
            font-size: 12px; font-weight: bold; transition: 0.2s;
        }
        .btn-view:active { transform: scale(0.9); }

        /* أنيميشن */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        #empty-msg { text-align: center; color: #64748b; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://files.catbox.moe/5s7y7a.png" alt="Sarab Logo" class="logo">
        <h1>روليت سراب 🔥</h1>
        <p>المنصة الرسمية للإحصائيات والمنشورات</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h2>32</h2><p>إجمالي السحوبات</p></div>
        <div class="stat-card"><h2>16</h2><p>سحب نشط</p></div>
        <div class="stat-card" style="grid-column: span 2;"><h2>841</h2><p>إجمالي المشاركين بالمشاريع</p></div>
    </div>

    <div class="section-header">
        <span class="section-title">🕒 أحدث المنشورات المعتمدة</span>
    </div>
    
    <div id="ad-container" class="ad-list">
        <div id="empty-msg">جاري مزامنة المنشورات من البوت...</div>
    </div>

    <script>
        // ملاحظة: استبدل الرابط أدناه برابط Firebase الخاص بك ليعمل النظام تلقائياً
        const FIREBASE_DB = "https://your-project-id.firebaseio.com/posts.json";

        async function loadAds() {
            try {
                const response = await fetch(FIREBASE_DB);
                const data = await response.json();
                const container = document.getElementById('ad-container');
                
                if (!data) {
                    container.innerHTML = "<div id='empty-msg'>لا توجد منشورات نشطة حالياً.</div>";
                    return;
                }

                container.innerHTML = ""; 
                // عرض المنشورات من الأحدث للأقدم
                Object.keys(data).reverse().forEach(id => {
                    const post = data[id];
                    container.innerHTML += `
                        <div class="ad-card">
                            <div class="ad-info">
                                <strong>${post.text}</strong>
                                <span>● نشط الآن</span>
                            </div>
                            <a href="${post.link}" target="_blank" class="btn-view">فتح المنشور</a>
                        </div>
                    `;
                });
            } catch (error) {
                console.log("في انتظار ربط قاعدة البيانات...");
            }
        }

        // تحديث البيانات تلقائياً كل 10 ثوانٍ
        loadAds();
        setInterval(loadAds, 10000);
    </script>
</body>
</html>
