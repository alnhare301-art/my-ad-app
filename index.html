<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت سراب | السلطة المطلقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0F172A; --card: #1E293B; --primary: #7C3AED;
            --success: #22C55E; --text: #E5E7EB; --text-dim: #94A3B8;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding-top: 70px; padding-bottom: 90px; line-height: 1.6;
        }

        /* 1. الهيدر الثابت */
        header {
            position: fixed; top: 0; width: 100%; height: 60px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img-small { width: 35px; height: 35px; border-radius: 8px; }
        .user-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

        /* 2. الشريط الإعلاني المتحرك (Marquee Style) */
        .promo-banner {
            margin: 10px 15px; background: linear-gradient(90deg, var(--primary), #4c1d95);
            border-radius: 12px; height: 45px; display: flex; align-items: center;
            overflow: hidden; position: relative;
        }
        .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; }
        .marquee-text {
            display: inline-block; padding-left: 100%; animation: marquee-kf 15s linear infinite;
            font-weight: 800; font-size: 13px; color: #fff;
        }
        @keyframes marquee-kf { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .btn-enter-inline { 
            position: absolute; left: 5px; background: #fff; color: #000; 
            padding: 4px 12px; border-radius: 8px; text-decoration: none; 
            font-weight: 900; font-size: 11px; z-index: 5; box-shadow: -5px 0 15px rgba(0,0,0,0.2);
        }

        /* 3. كروت السحوبات (الأزرار في نفس السطر) */
        .ad-item { 
            background: var(--card); border-radius: 15px; padding: 12px 15px; margin: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-right: 4px solid var(--primary); /* اللون الجانبي */
            position: relative;
        }
        .ad-featured { border-right-color: #fbbf24; border-right-width: 6px; }
        
        .item-info { flex: 1; min-width: 0; }
        .item-title { font-weight: 800; font-size: 14px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 10px; color: var(--text-dim); display: flex; gap: 8px; margin-top: 2px; }

        .btn-inline-action { 
            background: var(--primary); color: white; border: none; 
            padding: 8px 15px; border-radius: 10px; font-weight: 800; 
            font-size: 11px; cursor: pointer; white-space: nowrap; margin-right: 10px;
        }
        .btn-success { background: var(--success); }

        /* 4. الإحصائيات */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px 15px; }
        .stat-box { background: var(--card); padding: 10px 5px; border-radius: 10px; text-align: center; }
        .stat-box h4 { margin: 0; color: var(--primary); font-size: 16px; }
        .stat-box p { margin: 0; font-size: 9px; color: var(--text-dim); }

        /* 5. القائمة السفلية (Bottom Navigation) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000;
            padding-bottom: 5px;
        }
        .nav-item { color: var(--text-dim); text-decoration: none; text-align: center; font-size: 10px; font-weight: 700; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }

        .section-label { padding: 10px 15px 5px; font-weight: 900; font-size: 14px; color: var(--primary); }

        .container { max-width: 500px; margin: 0 auto; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://files.catbox.moe/5s7y7a.png" class="logo-img-small">
            <span style="font-weight: 900;">روليت سراب</span>
        </div>
        <div class="user-trigger">
            <img src="https://files.catbox.moe/5s7y7a.png" class="user-avatar">
        </div>
    </header>

    <div class="container">
        <div class="promo-banner">
            <div class="marquee-container">
                <span class="marquee-text" id="promo-msg">تحميل البيانات... انتظر قليلاً...</span>
            </div>
            <a href="#" id="promo-link" class="btn-enter-inline">دخول ⚡</a>
        </div>

        <div class="stats-row">
            <div class="stat-box"><h4>104</h4><p>سحب</p></div>
            <div class="stat-box"><h4>24k</h4><p>مشارك</p></div>
            <div class="stat-box"><h4>1k</h4><p>فائز</p></div>
            <div class="stat-box"><h4>99%</h4><p>ثقة</p></div>
        </div>

        <div class="section-label">💎 سحوبات ممولة</div>
        <div id="ads-area"></div>

        <div class="section-label">📄 أحدث السحوبات</div>
        <div id="posts-area"></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i>🏠</i>الرئيسية</a>
        <a href="#" class="nav-item"><i>🎁</i>السحوبات</a>
        <a href="https://t.me/Gift_News" class="nav-item"><i>📣</i>القناة</a>
        <a href="https://t.me/ttsnn" class="nav-item"><i>📢</i>قناتنا</a>
        <a href="#" class="nav-item"><i>👤</i>حسابي</a>
    </nav>

    <script>
        const dbURL = "https://sarab-app-84448-default-rtdb.firebaseio.com";
        
        async function sync() {
            try {
                const res = await fetch(`${dbURL}/.json`);
                const data = await res.json();

                // تحديث الشريط المتحرك
                if(data.ticker) {
                    document.getElementById('promo-msg').innerText = data.ticker.text;
                    document.getElementById('promo-link').href = data.ticker.link || "#";
                }

                // تحديث الإعلانات الممولة (الزر في نفس السطر)
                const adsArea = document.getElementById('ads-area');
                const ads = data.active_ads || {};
                const adKeys = Object.keys(ads).reverse().slice(0, 5);
                let adsHTML = "";
                adKeys.forEach(k => {
                    const ad = ads[k];
                    adsHTML += `
                        <div class="ad-item ${ad.featured ? 'ad-featured' : ''}">
                            <div class="item-info">
                                <span class="item-title">${ad.title}</span>
                                <div class="item-meta">
                                    <span>👥 ${ad.participants || 0}</span>
                                    <span>⏳ ${ad.end_at}</span>
                                </div>
                            </div>
                            <button class="btn-inline-action" onclick="window.location.href='${ad.post_url}'">شارك</button>
                        </div>`;
                });
                adsArea.innerHTML = adsHTML;

                // تحديث أحدث المنشورات
                const postsArea = document.getElementById('posts-area');
                let postsHTML = "";
                (data.latest_posts || []).reverse().slice(0, 10).forEach(p => {
                    postsHTML += `
                        <div class="ad-item" style="border-right-color: var(--success)">
                            <div class="item-info">
                                <span class="item-title">${p.text.substring(0,35)}...</span>
                                <div class="item-meta">
                                    <span>🕒 الآن</span>
                                    <span>👁️ ${p.views || 0}</span>
                                </div>
                            </div>
                            <button class="btn-inline-action btn-success" onclick="window.location.href='${p.url}'">دخول</button>
                        </div>`;
                });
                postsArea.innerHTML = postsHTML;

            } catch(e) { console.error(e); }
        }

        setInterval(sync, 5000);
        sync();
    </script>
</body>
</html>
