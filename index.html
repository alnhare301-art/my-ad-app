<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: #0088cc; color: white; padding: 20px; border-radius: 15px; cursor: pointer; font-weight: bold; border: none; }
        .btn:active { background: #006699; }
    </style>
</head>
<body>
    <h3>🛠 لوحة تحكم البوت</h3>
    <div class="grid">
        <div class="btn" onclick="sendToBot('create_post')">📝 إنشاء منشور</div>
        <div class="btn" onclick="sendToBot('request_ad')">📢 طلب إعلان</div>
        <div class="btn" onclick="sendToBot('my_stats')">📊 إحصائياتي</div>
        <div class="btn" onclick="sendToBot('support')">🎧 الدعم</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        function sendToBot(action) {
            tg.sendData(action); // إرسال الكلمة للبوت
            tg.close(); // إغلاق النافذة
        }
    </script>
</body>
</html>
