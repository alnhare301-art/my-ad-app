<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم سراب</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #6366f1; margin-bottom: 20px; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #1e293b; padding: 25px 10px; border-radius: 20px; border-bottom: 4px solid #6366f1; text-decoration: none; color: white; font-weight: bold; }
        .card:active { transform: scale(0.95); background: #334155; }
        .section { text-align: right; margin-top: 30px; border-right: 4px solid #f687b3; padding-right: 10px; }
        .post { background: #1e293b; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .btn-view { background: #6366f1; color: white; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <img src="https://files.catbox.moe/5s7y7a.png" class="logo">
    <h2>روليت سراب 🔥</h2>
    
    <div class="grid">
        <a href="https://t.me/Smileettbot?start=create" class="card">📝 إنشاء منشور</a>
        <a href="https://t.me/Smileettbot?start=ads" class="card">📢 طلب إعلان</a>
    </div>

    <div class="section">🕒 أحدث المنشورات والإعلانات</div>
    <div class="post">
        <div><strong>قناة المسابقات</strong><br><small style="color:#94a3b8;">👁 1.2k مشاهدة</small></div>
        <a href="https://t.me/sarab_channel" class="btn-view">فتح القناة</a>
    </div>
</body>
</html>
