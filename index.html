<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة روليت سراب - المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* الشريط العلوي */
        .ticker-wrap { background: linear-gradient(90deg, var(--primary), #a855f7); padding: 5px 0; position: fixed; top: 0; width: 100%; z-index: 1000; height: 50px; display: flex; align-items: center; justify-content: space-between; }
        .ticker { white-space: nowrap; overflow: hidden; flex-grow: 1; font-weight: bold; font-size: 14px; position: relative; }
        .ticker-text { display: inline-block; animation: ticker 20s linear infinite; padding-right: 50px; }
        .ticker-btn { background: white; color: var(--primary); padding: 5px 15px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; margin-left: 10px; margin-right: 10px; white-space: nowrap; z-index: 1001; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { padding: 90px 15px 30px; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 15px; }
        
        /* كرت الإعلان */
        .ad-card { background: var(--card); padding: 20px; border-radius: 20px; border-right: 6px solid var(--primary); margin: 20px auto; max-width: 400px; display: none; text-align: right; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .ad-meta { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; }
        .views-count { color: #f687b3; font-weight: bold; }
        .btn-link { background: var(--primary); color: white; padding: 12px; border-radius: 12px; text-decoration: none; display: block; text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker"><div class="ticker-text" id="ticker-content">جاري المزامنة...</div></div>
        <a href="#" id="ticker-link" class="ticker-btn">مشاهدة 👁️</a>
    </div>

    <div class="container">
        <img src="https://files.catbox.moe/5s7y7a.png" class="logo">
        <h1>روليت سراب 🔥</h1>
        
        <div id="active-ad-box" class="ad-card">
            <strong id="ad-title" style="font-size: 18px;">تحميل...</strong>
            <div id="ad-time" style="font-size: 12px; color: #22c55e; margin-top: 5px;"></div>
            
            <div class="ad-meta">
                <span>👁️ المشاهدات: <span class="views-count" id="views-num">0</span></span>
                <span id="end-time">ينتهي: --:--</span>
            </div>
            
            <a href="#" id="ad-link" class="btn-link">فتح المنشور مباشرة 🔓</a>
        </div>
    </div>

    <script>
        const firebaseURL = "https://sarab-app-84448-default-rtdb.firebaseio.com";
        let currentAdId = null;

        async function updateWebsite() {
            try {
                // 1. تحديث الشريط
                const tRes = await fetch(`${firebaseURL}/ticker.json`);
                const tData = await tRes.json();
                if (tData) {
                    document.getElementById('ticker-content').innerText = tData.text;
                    document.getElementById('ticker-link').href = tData.link || "#";
                }

                // 2. تحديث الإعلان
                const aRes = await fetch(`${firebaseURL}/active_ad.json`);
                const aData = await aRes.json();
                
                if (aData && aData.title && aData.title !== "لا يوجد إعلان نشط") {
                    document.getElementById('active-ad-box').style.display = 'block';
                    document.getElementById('ad-title').innerText = aData.title;
                    document.getElementById('ad-link').href = aData.post_url;
                    document.getElementById('views-num').innerText = aData.views || 0;
                    document.getElementById('end-time').innerText = "ينتهي: " + aData.end_at;
                    
                    // زيادة المشاهدات مرة واحدة لكل جلسة
                    if(currentAdId !== aData.start_ts) {
                        currentAdId = aData.start_ts;
                        incrementViews(aData.views || 0);
                    }
                } else {
                    document.getElementById('active-ad-box').style.display = 'none';
                }
            } catch (e) {}
        }

        async function incrementViews(current) {
            await fetch(`${firebaseURL}/active_ad/views.json`, {
                method: 'PUT',
                body: JSON.stringify(current + 1)
            });
        }

        setInterval(updateWebsite, 3000);
        updateWebsite();
    </script>
</body>
</html>
