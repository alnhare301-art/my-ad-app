<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة روليت سراب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; overflow-x: hidden; }
        .ticker-wrap { background: linear-gradient(90deg, var(--primary), #a855f7); padding: 10px 0; position: fixed; top: 0; width: 100%; z-index: 1000; overflow: hidden; height: 40px; }
        .ticker { white-space: nowrap; display: inline-block; animation: ticker 25s linear infinite; font-weight: bold; padding-top: 5px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .container { padding: 80px 15px; }
        .logo { width: 100px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 10px; }
        .ad-card { background: var(--card); padding: 20px; border-radius: 15px; border-right: 5px solid var(--primary); margin-top: 20px; display: none; transition: 0.5s; }
        .btn-link { background: var(--primary); color: white; padding: 12px 25px; border-radius: 12px; text-decoration: none; display: inline-block; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker" id="ticker-text">🚀 جاري الاتصال بنظام سراب...</div>
    </div>

    <div class="container">
        <img src="https://files.catbox.moe/5s7y7a.png" class="logo">
        <h1 style="margin: 0; font-size: 26px;">روليت سراب 🔥</h1>
        <p style="color: #94a3b8;">إدارة السحوبات والإعلانات الذكية</p>
        
        <div id="active-ad-box" class="ad-card">
            <div style="text-align: right">
                <strong id="ad-title" style="font-size: 18px;">اسم الإعلان</strong>
                <p id="ad-status" style="color: #22c55e; font-size: 13px; margin: 5px 0;"></p>
            </div>
            <a href="#" id="ad-link" class="btn-link">فتح السحب 🔓</a>
        </div>
    </div>

    <script>
        // رابط الـ Firebase الخاص بك
        const dbUrl = "https://sarab-app-84448-default-rtdb.firebaseio.com";

        async function syncData() {
            try {
                // تحديث الشريط
                const tRes = await fetch(`${dbUrl}/ticker.json`);
                const tData = await tRes.json();
                if(tData) document.getElementById('ticker-text').innerText = tData.text;

                // تحديث الإعلان
                const aRes = await fetch(`${dbUrl}/active_ad.json`);
                const aData = await aRes.json();
                if(aData && aData.title !== "لا يوجد إعلان نشط") {
                    document.getElementById('active-ad-box').style.display = 'block';
                    document.getElementById('ad-title').innerText = aData.title;
                    document.getElementById('ad-status').innerText = "● " + aData.status;
                    document.getElementById('ad-link').href = `https://t.me/${aData.channel.replace('@','')}`;
                } else {
                    document.getElementById('active-ad-box').style.display = 'none';
                }
            } catch(e) { console.log("جاري المزامنة..."); }
        }

        setInterval(syncData, 3000);
        syncData();
    </script>
</body>
</html>
